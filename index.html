    async function loadExpensesFromCloud() {
      const res = await fetch("/api/db", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "list" })

      if (!res.ok) throw new Error("DB error " + res.status);
      const rows = await res.json();
      return rows.map(r => ({
        id: r.id, userId: r.user_id, userName: r.user_name,
        date: r.date, amount: r.amount, currency: r.currency || "EUR",
        category: r.category, description: r.description,
        sharedWith: r.shared_with || "",
        tip: r.tip || 0,
        paymentMethod: r.payment_method || "carta",
        visitReason: r.visit_reason || "",
        place: r.place || "",
        status: r.status, note: r.note || "",
        receipt: !!r.receipt, receiptPreview: null,
        receiptFull: r.receipt_url || null,
      }));
    }

    async function uploadReceiptToStorage(expId, base64data, mimeType) {
      const byteStr = atob(base64data);
      const arr = new Uint8Array(byteStr.length);
      for (let i = 0; i < byteStr.length; i++) arr[i] = byteStr.charCodeAt(i);
      const blob = new Blob([arr], { type: mimeType });
      const ext = mimeType.includes("pdf") ? "pdf" : "jpg";
      const path = `receipts/${expId}.${ext}`;
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${path}`, {
        method: "POST",
        headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}`, "Content-Type": mimeType },
        body: blob,
      });
      if (!res.ok) {
        // Try upsert
        const res2 = await fetch(`${SUPABASE_URL}/storage/v1/object/${path}`, {
          method: "PUT",
          headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}`, "Content-Type": mimeType, "x-upsert": "true" },
          body: blob,
        });
        if (!res2.ok) throw new Error("Storage upload failed");
      }
      return `${SUPABASE_URL}/storage/v1/object/public/${path}`;
    }

    function InstallBanner() {
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [show, setShow] = useState(false);

        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

    // ─── New Expense Modal ────────────────────────────────────────────────────────

    function NewExpenseModal({ onClose, onSave, currentUserId, currentUserName, initialData }) {
      const isEdit = !!initialData;
      const [form, setForm] = useState(initialData ? {
        date: initialData.date, amount: String(initialData.amount),
        category: initialData.category, description: initialData.description,
        receipt: initialData.receipt, currency: initialData.currency || "EUR",
        sharedWith: initialData.sharedWith || "", tip: initialData.tip || 0,
        paymentMethod: initialData.paymentMethod || "carta", visitReason: initialData.visitReason || "", place: initialData.place || "",
      } : { date: new Date().toISOString().split("T")[0], amount:"", category:"travel", description:"", receipt:false, currency:"EUR", sharedWith:"", tip:0, paymentMethod:"carta", visitReason:"", place:"" });
      const [receiptPreview, setReceiptPreview] = useState(initialData?.receiptFull || null);
      const [receiptName, setReceiptName] = useState(initialData?.receipt ? "Scontrino esistente" : "");
      const [saving, setSaving] = useState(false);
      const [ocring, setOcring] = useState(false);
      const [ocrError, setOcrError] = useState("");
      const [lightbox, setLightbox] = useState(false);
      const cameraRef = useRef();
      const galleryRef = useRef();

      const compressImage = (dataUrl, maxPx=1200, quality=0.75) => new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = dataUrl;
      });

      const runOCR = async (base64Image) => {
        setOcring(true); setOcrError("");
        try {
          const mediaType = base64Image.split(";")[0].split(":")[1] || "image/jpeg";
          const base64Data = base64Image.split(",")[1];
          const resp = await fetch("/api/ocr", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: base64Data, mediaType })
          });
          if (!resp.ok) throw new Error("Server error " + resp.status);
          const parsed = await resp.json();
          if (parsed.error) throw new Error(parsed.error);
          setForm(f => ({
            ...f,
            amount: parsed.importo != null ? String(parsed.importo) : f.amount,
            date: parsed.data || f.date,
            description: parsed.descrizione || f.description || "",
            category: parsed.categoria || f.category,
          }));
        } catch(e) {
          console.error("OCR error:", e);
          setOcrError("Non riesco a leggere lo scontrino. Compila manualmente.");
        } finally { setOcring(false); }
      };

      const handleFile = async e => {
        const file = e.target.files[0];
        if (!file) return;
        setReceiptName(file.name);
        setForm(f => ({ ...f, receipt:true }));
        const reader = new FileReader();
        reader.onload = async ev => {
          const original = ev.target.result;
          setReceiptPreview(original);
          if (file.type.startsWith("image/")) {
            const compressed = await compressImage(original);
            runOCR(compressed);
          }
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const clearReceipt = () => { setReceiptPreview(null); setReceiptName(""); setOcrError(""); setForm(f => ({ ...f, receipt:false })); };

      const handleSave = () => {
        if (!form.amount || !form.description) return;
        setSaving(true);
        setTimeout(() => {
          if (isEdit) {
            onSave({ ...initialData, ...form, amount:parseFloat(form.amount), receiptPreview, receiptFull:receiptPreview });
          } else {
            onSave({ id:Date.now(), userId:currentUserId, userName:currentUserName, ...form, amount:parseFloat(form.amount), status:"pending", note:"", receiptPreview, receiptFull:receiptPreview });
          }
          onClose();
        }, 300);
      };

      const valid = form.amount && form.description;

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(6px)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }} onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:"#1e293b", borderRadius:"22px 22px 0 0", padding:"20px 20px 0", width:"100%", maxWidth:520, border:"1px solid #334155", boxShadow:"0 -24px 60px rgba(0,0,0,0.6)", maxHeight:"92vh", overflowY:"auto", paddingBottom:"calc(24px + env(safe-area-inset-bottom, 0px))" }}>
            <div style={{ width:36, height:4, borderRadius:2, background:"#334155", margin:"0 auto 18px" }} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <h2 style={{ color:"#f1f5f9", fontSize:17, fontWeight:800, margin:0 }}>{isEdit ? "Modifica Spesa" : "Nuova Spesa"}</h2>
              <button onClick={onClose} style={{ background:"#0f172a", border:"1px solid #334155", color:"#94a3b8", width:30, height:30, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:13 }}>✕</button>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              {ocring && (
                <div style={{ background:"rgba(99,102,241,0.12)", border:"1px solid rgba(99,102,241,0.3)", borderRadius:10, padding:"10px 14px", display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:16, height:16, border:"2px solid #6366f1", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite", flexShrink:0 }} />
                  <div style={{ color:"#a5b4fc", fontSize:13, fontWeight:600 }}>Lettura scontrino in corso...</div>
                </div>
              )}
              {ocrError && <div style={{ background:"rgba(245,158,11,0.1)", border:"1px solid rgba(245,158,11,0.3)", borderRadius:10, padding:"10px 14px", color:"#f59e0b", fontSize:12, fontWeight:600 }}>⚠️ {ocrError}</div>}

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <div>
                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>DATA</label>
                  <input type="date" value={form.date} onChange={e => setForm({...form, date:e.target.value})}
                    style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
                </div>
                <div>
                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>IMPORTO {ocring && <span style={{color:"#6366f1"}}>⟳</span>}</label>
                  <div style={{ display:"flex", gap:6 }}>
                    <select value={form.currency} onChange={e => setForm({...form, currency:e.target.value})}
                      style={{ padding:"11px 8px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:13, fontWeight:700, cursor:"pointer", flexShrink:0 }}>

                      <option value="USD">$ USD</option>
                      <option value="MXN">$ MXN (Pesos)</option>
                      <option value="PLN">zł PLN (Zloty)</option>
                      <option value="RON">RON (Lei)</option>
                      <option value="TRY">₺ TRY (Lira)</option>

                </div>

                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>MANCIA / TIP</label>
                  <input type="number" inputMode="decimal" placeholder="0.00" value={form.tip||""} onChange={e => setForm({...form, tip: parseFloat(e.target.value)||0})}
                    style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
                </div>
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:7, letterSpacing:0.8 }}>CATEGORIA</label>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                  {CATEGORIES.map(cat => (
                    <button key={cat.id} onClick={() => setForm({...form, category:cat.id})}
                      style={{ padding:"6px 11px", borderRadius:20, border:"2px solid", borderColor: form.category===cat.id ? cat.color : "#334155", background: form.category===cat.id ? `${cat.color}20` : "#0f172a", color: form.category===cat.id ? cat.color : "#64748b", fontSize:12, fontWeight:600, cursor:"pointer", transition:"all 0.15s" }}>
                      {cat.icon} {cat.label}
                    </button>

                </div>
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>DESCRIZIONE {ocring && <span style={{color:"#6366f1"}}>⟳</span>}</label>
                <input type="text" placeholder="Descrivi la spesa..." value={form.description} onChange={e => setForm({...form, description:e.target.value})}
                  style={{ width:"100%", padding:"11px 12px", borderRadius:10, border: ocring ? "1px solid #6366f1" : "1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14, transition:"border 0.3s" }} />
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>OSPITI</label>
                <input type="text" placeholder="Es: Mario Rossi, Cliente ABC..." value={form.sharedWith} onChange={e => setForm({...form, sharedWith:e.target.value})}
                  style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <div>
                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>MODALITÀ PAGAMENTO</label>
                  <select value={form.paymentMethod} onChange={e => setForm({...form, paymentMethod:e.target.value})}
                    style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14, cursor:"pointer" }}>
                    <option value="carta">💳 Carta di credito</option>
                    <option value="cash">💵 Cash</option>
                  </select>
                </div>
                <div>
                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>MOTIVO VISITA</label>
                  <select value={form.visitReason} onChange={e => setForm({...form, visitReason:e.target.value})}
                    style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14, cursor:"pointer" }}>
                    <option value="">-- seleziona --</option>
                    <option value="fiera">🏢 Fiera</option>
                    <option value="assistenza">🔧 Assistenza tecnica</option>
                    <option value="cliente">🤝 Cliente</option>
                  </select>
                </div>
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>LUOGO</label>
                <input type="text" placeholder="Es: Milano, Francoforte, Budapest..." value={form.place} onChange={e => setForm({...form, place:e.target.value})}
                  style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:8, letterSpacing:0.8 }}>SCONTRINO / RICEVUTA</label>
                <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{ display:"none" }} onChange={handleFile} />
                <input ref={galleryRef} type="file" accept="image/*,application/pdf" style={{ display:"none" }} onChange={handleFile} />
                {!receiptPreview ? (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    <button onClick={() => cameraRef.current.click()} style={{ padding:"20px 12px", borderRadius:14, border:"2px dashed #334155", background:"#0f172a", color:"#94a3b8", fontSize:13, fontWeight:600, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:28 }}>📷</span><span>Fotocamera</span>
                    </button>
                    <button onClick={() => galleryRef.current.click()} style={{ padding:"20px 12px", borderRadius:14, border:"2px dashed #334155", background:"#0f172a", color:"#94a3b8", fontSize:13, fontWeight:600, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:28 }}>🖼️</span><span>Galleria / PDF</span>
                    </button>
                  </div>
                ) : (
                  <div style={{ borderRadius:14, overflow:"hidden", border:`2px solid ${ocring ? "#6366f1" : "#10b981"}`, position:"relative", transition:"border 0.3s" }}>
                    <img src={receiptPreview} alt="Scontrino" style={{ width:"100%", maxHeight:200, objectFit:"cover", display:"block", cursor:"pointer" }} onClick={() => !ocring && setLightbox(true)} />
                    {ocring && (
                      <div style={{ position:"absolute", inset:0, background:"rgba(99,102,241,0.3)", display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(2px)" }}>
                        <div style={{ color:"#fff", fontWeight:700, fontSize:13, display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ width:18, height:18, border:"3px solid #fff", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
                          Analisi AI...
                        </div>
                      </div>
                    )}
                    <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%)", display:"flex", alignItems:"flex-end", padding:10, justifyContent:"space-between", pointerEvents: ocring ? "none" : "auto" }}>
                      <div style={{ color:"#fff", fontSize:11, fontWeight:600 }} onClick={() => !ocring && setLightbox(true)}>{ocring ? "🤖 Lettura..." : `✅ ${receiptName || "Allegato"} · 🔍 anteprima`}</div>
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={() => cameraRef.current.click()} style={{ padding:"5px 10px", borderRadius:7, border:"none", background:"rgba(255,255,255,0.2)", color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer" }}>📷 Rifai</button>
                        <button onClick={clearReceipt} style={{ padding:"5px 10px", borderRadius:7, border:"none", background:"rgba(239,68,68,0.7)", color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer" }}>Rimuovi</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div style={{ display:"flex", gap:10, marginTop:20, marginBottom:4 }}>
              <button onClick={onClose} style={{ flex:1, padding:13, borderRadius:12, border:"1px solid #334155", background:"none", color:"#94a3b8", fontWeight:600, cursor:"pointer" }}>Annulla</button>
              <button onClick={handleSave} disabled={!valid || saving || ocring}
                style={{ flex:2, padding:13, borderRadius:12, border:"none", background: valid && !ocring ? "linear-gradient(135deg,#3b82f6,#6366f1)" : "#334155", color: valid && !ocring ? "#fff" : "#64748b", fontWeight:700, fontSize:15, cursor: valid && !ocring ? "pointer" : "default", boxShadow: valid && !ocring ? "0 4px 16px rgba(99,102,241,0.4)" : "none", transition:"all 0.2s" }}>
                {ocring ? "⟳ Lettura..." : saving ? (isEdit ? "Salvo..." : "Invio...") : (isEdit ? "Salva Modifiche" : "Invia Spesa")}
              </button>
            </div>
          </div>
        </div>

        {lightbox && receiptPreview && (
          <div onClick={() => setLightbox(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300, padding:16 }}>
            <img src={receiptPreview} alt="Scontrino" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:12, objectFit:"contain" }} />
            <button onClick={() => setLightbox(false)} style={{ position:"absolute", top:20, right:20, background:"rgba(255,255,255,0.15)", border:"none", color:"#fff", width:36, height:36, borderRadius:"50%", fontSize:18, cursor:"pointer" }}>✕</button>
          </div>
        )}
      );
    }

    // ─── ReadOnly Expense Modal ───────────────────────────────────────────────────

    function ReadOnlyExpenseModal({ exp, onClose, onViewReceipt }) {
      const cat = getCatInfo(exp.category);
      const imgSrc = exp.receiptFull || exp.receiptPreview;
      const isApproved = exp.status === "approved";
      const accentColor = isApproved ? "#10b981" : "#f87171";
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(6px)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:150 }}
          onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:"#1e293b", borderRadius:"20px 20px 0 0", padding:"20px 20px 0", width:"100%", maxWidth:520, border:"1px solid #334155", borderTop:`3px solid ${accentColor}`, maxHeight:"85vh", overflowY:"auto", paddingBottom:"calc(24px + env(safe-area-inset-bottom,0px))" }}>
            <div style={{ width:36, height:4, borderRadius:2, background:"#334155", margin:"0 auto 16px" }} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
              <div>
                <div style={{ color:accentColor, fontSize:11, fontWeight:700, letterSpacing:2, textTransform:"uppercase", marginBottom:4 }}>{isApproved ? "✓ Approvata" : "✕ Rifiutata"}</div>
                <div style={{ color:"#f1f5f9", fontWeight:800, fontSize:16 }}>{exp.description}</div>
              </div>
              <button onClick={onClose} style={{ background:"#0f172a", border:"1px solid #334155", color:"#888", width:28, height:28, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:14, flexShrink:0 }}>✕</button>
            </div>
            <div style={{ background:"#0f172a", borderRadius:14, padding:"14px 16px", marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ color:"#64748b", fontSize:13 }}>Importo</div>
              <div style={{ color:"#3b82f6", fontSize:22, fontWeight:900 }}>{formatAmount(exp.amount, exp.currency||"EUR")}</div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              {[
                { label:"Data", value:exp.date },
                { label:"Categoria", value:`${cat.icon} ${cat.label}` },
                ...(exp.sharedWith ? [{ label:"Ospiti", value:exp.sharedWith }] : []),
                ...(exp.tip > 0 ? [{ label:"Mancia", value:formatAmount(exp.tip, exp.currency||"EUR") }] : []),
                ...(exp.paymentMethod ? [{ label:"Pagamento", value: exp.paymentMethod==="carta" ? "💳 Carta" : "💵 Cash" }] : []),
                ...(exp.visitReason ? [{ label:"Motivo", value: {fiera:"🏢 Fiera", assistenza:"🔧 Assistenza", cliente:"🤝 Cliente"}[exp.visitReason] || exp.visitReason }] : []),
                ...(exp.place ? [{ label:"Luogo", value:"📍 "+exp.place }] : []),
                { label:"Scontrino", value: exp.receipt ? "📎 Allegato" : "Non allegato" },
              ].map(d => (
                <div key={d.label} style={{ background:"#0f172a", borderRadius:12, padding:"10px 12px" }}>
                  <div style={{ color:"#64748b", fontSize:11, fontWeight:700, letterSpacing:1, textTransform:"uppercase", marginBottom:4 }}>{d.label}</div>
                  <div style={{ color:"#f1f5f9", fontSize:14, fontWeight:600 }}>{d.value}</div>
                </div>
              ))}
            </div>
            {exp.note && (
              <div style={{ background: isApproved ? "rgba(16,185,129,0.08)" : "rgba(239,68,68,0.08)", border:`1px solid ${accentColor}30`, borderRadius:14, padding:"12px 14px", marginBottom:14 }}>
                <div style={{ color:"#64748b", fontSize:11, fontWeight:700, letterSpacing:1, textTransform:"uppercase", marginBottom:4 }}>Nota amministratore</div>
                <div style={{ color:accentColor, fontSize:14, fontWeight:600 }}>💬 {exp.note}</div>
              </div>
            )}
            {imgSrc && (
              <div style={{ borderRadius:14, overflow:"hidden", border:"1px solid #334155", marginBottom:14, cursor:"pointer" }} onClick={() => onViewReceipt(imgSrc)}>
                <img src={imgSrc} alt="Scontrino" style={{ width:"100%", maxHeight:200, objectFit:"cover", display:"block" }} />
                <div style={{ background:"#0f172a", padding:"7px 12px", color:"#64748b", fontSize:13 }}>📷 Tocca per ingrandire</div>
              </div>
            )}
            <button onClick={onClose} style={{ width:"100%", padding:13, borderRadius:14, border:"1px solid #334155", background:"none", color:"#888", fontWeight:600, cursor:"pointer", fontSize:14 }}>Chiudi</button>
          </div>
        </div>
      );
    }

    // ─── Employee View ────────────────────────────────────────────────────────────

    function EmployeeView({ user, expenses, onAddExpense, onEditExpense, onDeleteExpense, onLogout }) {
      const [showModal, setShowModal] = useState(false);
      const [editingExpense, setEditingExpense] = useState(null);
      const [deletingExpense, setDeletingExpense] = useState(null);
      const [viewReceipt, setViewReceipt] = useState(null);
      const [viewingExpense, setViewingExpense] = useState(null);

      const myExpenses = expenses.filter(e => e.userId === user.id);
      const eurExp   = myExpenses.filter(e => (e.currency||"EUR")==="EUR");
      const total    = eurExp.reduce((s,e) => s+e.amount, 0);
      const approved = eurExp.filter(e => e.status==="approved").reduce((s,e) => s+e.amount, 0);
      const pending  = eurExp.filter(e => e.status==="pending").reduce((s,e) => s+e.amount, 0);
      const usdTotal = myExpenses.filter(e => e.currency==="USD").reduce((s,e) => s+e.amount, 0);

      return (
        <div style={{ minHeight:"100vh", background:"#0f172a", paddingBottom:80 }}>
          <div style={{ background:"#1e293b", borderBottom:"1px solid #334155", padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:34, height:34, borderRadius:9, background:"linear-gradient(135deg,#3b82f6,#6366f1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>💼</div>
              <div>
                <div style={{ color:"#f1f5f9", fontWeight:800, fontSize:14 }}>SpesApp</div>
                <div style={{ color:"#64748b", fontSize:11 }}>Le mie spese</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <Avatar name={user.name} size={32} />
              <button onClick={onLogout} style={{ background:"none", border:"1px solid #334155", color:"#94a3b8", padding:"5px 10px", borderRadius:7, cursor:"pointer", fontSize:11, fontWeight:600 }}>Esci</button>
            </div>
          </div>

          <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 14px" }}>
            <div style={{ marginBottom:20 }}>
              <h1 style={{ color:"#f8fafc", fontSize:20, fontWeight:800, margin:0 }}>Ciao, {user.name.split(" ")[0]} 👋</h1>
              <p style={{ color:"#64748b", margin:"3px 0 0", fontSize:13 }}>Riepilogo note spese</p>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:`repeat(${usdTotal > 0 ? 4 : 3},1fr)`, gap:10, marginBottom:20 }}>
              {[
                { label:"Totale €", value:formatEur(total), color:"#3b82f6" },
                { label:"Approvato", value:formatEur(approved), color:"#10b981" },
                { label:"In attesa", value:formatEur(pending), color:"#f59e0b" },
                ...(usdTotal > 0 ? [{ label:"Totale $", value:formatAmount(usdTotal,"USD"), color:"#10b981" }] : []),
              ].map(s => (
                <div key={s.label} style={{ background:"#1e293b", borderRadius:14, padding:"14px 12px", border:"1px solid #334155" }}>
                  <div style={{ color:"#64748b", fontSize:10, fontWeight:700, marginBottom:5, letterSpacing:0.5 }}>{s.label.toUpperCase()}</div>
                  <div style={{ color:s.color, fontSize:15, fontWeight:800 }}>{s.value}</div>
                </div>
              ))}
            </div>

            <button onClick={() => setShowModal(true)} style={{ width:"100%", padding:14, borderRadius:14, border:"2px dashed #334155", background:"rgba(59,130,246,0.05)", color:"#3b82f6", fontWeight:700, fontSize:15, cursor:"pointer", marginBottom:18, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              <span style={{ fontSize:20, lineHeight:1 }}>+</span> Nuova Nota Spesa
            </button>

            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {myExpenses.length===0 && (
                <div style={{ textAlign:"center", padding:40, color:"#64748b" }}>
                  <div style={{ fontSize:36, marginBottom:10 }}>📭</div>
                  <div>Nessuna spesa inserita</div>
                </div>
              )}
              {myExpenses.map(exp => {
                const cat = getCatInfo(exp.category);
                const canEdit = true;
                const canView = false;
                return (
                  <div key={exp.id} style={{ background:"#1e293b", borderRadius:14, border:"1px solid #334155", overflow:"hidden" }}>
                    <div style={{ padding:"14px 16px", display:"flex", alignItems:"center", gap:12 }}
                      onClick={() => canView && setViewingExpense(exp)}>
                      {exp.receiptFull || exp.receiptPreview ? (
                        <img src={exp.receiptFull || exp.receiptPreview} alt="scontrino" onClick={e => { e.stopPropagation(); setViewReceipt(exp.receiptFull || exp.receiptPreview); }}
                          style={{ width:46, height:46, borderRadius:10, objectFit:"cover", border:"2px solid #10b981", flexShrink:0, cursor:"pointer" }} />
                      ) : (
                        <div style={{ width:46, height:46, borderRadius:10, background:`${cat.color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{cat.icon}</div>
                      )}
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ color:"#f1f5f9", fontWeight:600, fontSize:14, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{exp.description}</div>
                        <div style={{ color:"#64748b", fontSize:12, marginTop:2 }}>{cat.label} · {exp.date}{exp.place ? ` · 📍 ${exp.place}` : ""}{exp.sharedWith ? ` · 👥 ${exp.sharedWith}` : ""}{exp.receipt ? " · 📎" : ""}</div>
                        {exp.note && <div style={{ color:"#f59e0b", fontSize:11, marginTop:2 }}>⚠️ {exp.note}</div>}
                      </div>
                      <div style={{ textAlign:"right", flexShrink:0 }}>
                        <div style={{ color:"#f1f5f9", fontWeight:800, fontSize:15 }}>{formatAmount(exp.amount, exp.currency||"EUR")}</div>
                        <div style={{ marginTop:4 }}><StatusBadge status={exp.status} /></div>
                      </div>
                    </div>
                    {canEdit && (
                      <div style={{ display:"flex", borderTop:"1px solid #0f172a" }}>
                        <button onClick={() => setEditingExpense(exp)} style={{ flex:1, padding:"9px", background:"none", border:"none", color:"#3b82f6", fontWeight:600, fontSize:12, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:5 }}>
                          ✏️ Modifica
                        </button>
                        <div style={{ width:1, background:"#0f172a" }} />
                        <button onClick={() => setDeletingExpense(exp)} style={{ flex:1, padding:"9px", background:"none", border:"none", color:"#ef4444", fontWeight:600, fontSize:12, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:5 }}>
                          🗑️ Elimina
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {showModal && <NewExpenseModal onClose={() => setShowModal(false)} onSave={onAddExpense} currentUserId={user.id} currentUserName={user.name} />}
          {editingExpense && <NewExpenseModal onClose={() => setEditingExpense(null)} onSave={exp => { onEditExpense({...exp, status: (editingExpense.status==="approved" || editingExpense.status==="rejected") ? "pending" : exp.status, note: ""}); setEditingExpense(null); }} currentUserId={user.id} currentUserName={user.name} initialData={editingExpense} />}

          {deletingExpense && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(5px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:150, padding:20 }}>
              <div style={{ background:"#1e293b", borderRadius:18, padding:"24px 20px", width:"100%", maxWidth:360, border:"1px solid #334155" }}>
                <div style={{ fontSize:32, textAlign:"center", marginBottom:12 }}>🗑️</div>
                <h3 style={{ color:"#f1f5f9", fontSize:16, fontWeight:800, textAlign:"center", margin:"0 0 6px" }}>Elimina spesa?</h3>
                <p style={{ color:"#64748b", fontSize:13, textAlign:"center", margin:"0 0 20px" }}>"{deletingExpense.description}" — {formatAmount(deletingExpense.amount, deletingExpense.currency||"EUR")}</p>
                {deletingExpense.status === "approved" && <div style={{ background:"rgba(245,158,11,0.1)", border:"1px solid rgba(245,158,11,0.3)", borderRadius:10, padding:"8px 12px", marginBottom:14, color:"#f59e0b", fontSize:12, fontWeight:600, textAlign:"center" }}>⚠️ Questa spesa è già stata approvata dall'admin</div>}
                {deletingExpense.status === "rejected" && <div style={{ background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:10, padding:"8px 12px", marginBottom:14, color:"#ef4444", fontSize:12, fontWeight:600, textAlign:"center" }}>⚠️ Questa spesa è stata rifiutata dall'admin</div>}
                <div style={{ display:"flex", gap:10 }}>

    // ─── Admin View ───────────────────────────────────────────────────────────────

    // ─── App Root ─────────────────────────────────────────────────────────────────

    function App() {
      const [currentUser, setCurrentUser] = useState(() => loadSession());
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [dbError, setDbError] = useState("");

      useEffect(() => {
        if (!currentUser) { setLoading(false); return; }
        setLoading(true);
        setDbError("");
        loadExpensesFromCloud()
          .then(rows => { setExpenses(rows); setLoading(false); })
          .catch(e => { setDbError("Errore connessione database. Riprova."); setLoading(false); });
      }, [currentUser]);

      const handleLogin = user => {
        sessionStorage.setItem("spesapp_user", JSON.stringify(user));
        setCurrentUser(user);
      };

      const handleLogout = () => {
        sessionStorage.removeItem("spesapp_user");
        setCurrentUser(null);
      };

      const handleAddExpense = useCallback(async exp => {
        // Strip images before saving to DB
        const expForDb = { ...exp, receiptPreview: null, receiptFull: null };
        let receiptUrl = null;
        if (exp.receiptPreview) {
          try {
            const parts = exp.receiptPreview.split(",");
            const mime = parts[0].split(":")[1]?.split(";")[0] || "image/jpeg";
            receiptUrl = await uploadReceiptToStorage(exp.id, parts[1], mime);
            expForDb.receiptFull = receiptUrl;
          } catch(e) { console.warn("Upload failed", e); }
        }
        await saveExpenseToCloud({ ...expForDb, receipt: !!receiptUrl || exp.receipt });
        setExpenses(prev => [{ ...exp, receiptFull: receiptUrl || exp.receiptFull }, ...prev]);
      }, []);

      const handleEditExpense = useCallback(async exp => {
        const expForDb = { ...exp };
        if (exp.receiptPreview && exp.receiptPreview.startsWith("data:")) {
          try {
            const parts = exp.receiptPreview.split(",");
            const mime = parts[0].split(":")[1]?.split(";")[0] || "image/jpeg";
            const url = await uploadReceiptToStorage(exp.id, parts[1], mime);
            expForDb.receiptFull = url;
          } catch(e) { console.warn("Upload failed", e); }
        }
        await updateExpenseInCloud(exp.id, {
          date: expForDb.date, amount: expForDb.amount, currency: expForDb.currency||"EUR",
          category: expForDb.category, description: expForDb.description,
          shared_with: expForDb.sharedWith||"", tip: expForDb.tip||0,
          payment_method: expForDb.paymentMethod||"carta", visit_reason: expForDb.visitReason||"", place: expForDb.place||"",
          receipt: expForDb.receipt, receipt_url: expForDb.receiptFull||null,
        });
        setExpenses(prev => prev.map(e => e.id===exp.id ? expForDb : e));
      }, []);

      const handleDeleteExpense = useCallback(async id => {
        await deleteExpenseFromCloud(id);
        setExpenses(prev => prev.filter(e => e.id !== id));
      }, []);

      const handleUpdateStatus = useCallback(async (id, status, note) => {
        await updateExpenseInCloud(id, { status, note: note||"" });
        setExpenses(prev => prev.map(e => e.id===id ? { ...e, status, note } : e));
      }, []);

      if (!currentUser) return <LoginScreen onLogin={handleLogin} />;

      if (loading) return (
        <div style={{ minHeight:"100vh", background:"#0f172a", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
          <div style={{ width:24, height:24, border:"3px solid #3b82f6", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
          <div style={{ color:"#64748b", fontSize:14 }}>Caricamento...</div>
        </div>
      );

      if (dbError) return (
        <div style={{ minHeight:"100vh", background:"#0f172a", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, padding:24 }}>
          <div style={{ fontSize:40 }}>⚠️</div>
          <div style={{ color:"#f1f5f9", fontSize:16, fontWeight:700, textAlign:"center" }}>{dbError}</div>
          <button onClick={() => window.location.reload()} style={{ padding:"12px 24px", borderRadius:10, border:"none", background:"#3b82f6", color:"#fff", fontWeight:700, cursor:"pointer" }}>Riprova</button>
        </div>
      );

      if (currentUser.role==="admin") return <AdminView user={currentUser} expenses={expenses} onUpdateStatus={handleUpdateStatus} onLogout={handleLogout} />;
      return <EmployeeView user={currentUser} expenses={expenses} onAddExpense={handleAddExpense} onEditExpense={handleEditExpense} onDeleteExpense={handleDeleteExpense} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
