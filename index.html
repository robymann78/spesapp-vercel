    /* Card hover */
    .card-hover { transition: border-color 0.2s, transform 0.15s; }
    .card-hover:active { transform: scale(0.985); }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    // ─── Persistence — Supabase Cloud ────────────────────────────────────────

    const IMG_PREFIX = "spesapp_img_";
    // Local cache for session preview (immagine mostrata subito senza attendere il cloud)

    // Upload diretto a Supabase Storage dal browser (bypassa il limite 4.5MB di Vercel)
    const SUPABASE_URL = "https://ljtwipkannwwfnvhqbxd.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqdHdpcGthbm53d2ZudmhxYnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzc2MzUsImV4cCI6MjA5MTgxMzYzNX0.J-Y9D1pdd_ipMe8-X0IKCXY1y-zmI5GYEyBMLVVUi5o";

    async function uploadImageToCloud(expenseId, base64Image) {
      try {
        const mediaType = base64Image.split(";")[0].split(":")[1] || "image/jpeg";
        const base64Data = base64Image.split(",")[1];
        const ext = mediaType.includes("png") ? "png" : "jpg";
        const path = `${expenseId}.${ext}`;

        // Converti base64 in Blob
        const binary = atob(base64Data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: mediaType });

        // Upload diretto a Supabase Storage
        const res = await fetch(`${SUPABASE_URL}/storage/v1/object/receipts/${path}`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_ANON,
            "Authorization": `Bearer ${SUPABASE_ANON}`,
            "Content-Type": mediaType,
            "x-upsert": "true",
          },
          body: blob,
        });

        if (!res.ok) { console.error("Upload failed:", await res.text()); return null; }
        return `${SUPABASE_URL}/storage/v1/object/public/receipts/${path}`;
      } catch(e) { console.error("Upload error:", e); return null; }
    }

    async function deleteImageFromCloud(expenseId) {
      try {
        for (const ext of ["jpg", "png"]) {
          await fetch(`${SUPABASE_URL}/storage/v1/object/receipts/${expenseId}.${ext}`, {
            method: "DELETE",
            headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` },
          });
        }
      } catch {}
    }

    async function dbFetch(action, payload = {}) {
      const res = await fetch("/api/db", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action, ...payload })
      });
      if (!res.ok) throw new Error(`DB error ${res.status}`);
      return res.json();
    }

    async function loadExpensesFromCloud() {
      const res = await fetch("/api/db");
      if (!res.ok) throw new Error("Load failed");
      const rows = await res.json();
      // Usa URL cloud se disponibile, altrimenti fallback a cache locale
      return rows.map(e => {
        if (e.receiptUrl) return { ...e, receiptFull: e.receiptUrl, receiptPreview: e.receiptUrl };
        const img = loadImageLocal(e.id);
        return img ? { ...e, receiptFull: img, receiptPreview: img } : e;
      });
    }

    function loadSession() {
      try { const r = sessionStorage.getItem("spesapp_user"); return r ? JSON.parse(r) : null; } catch { return null; }

    // ─── Shared UI ───────────────────────────────────────────────────────────

    // ─── Install Banner ───────────────────────────────────────────────────────

    function InstallBanner() {
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [show, setShow] = useState(false);
      const [installed, setInstalled] = useState(false);

      useEffect(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) return;
        const dismissed = sessionStorage.getItem("pwa_dismissed");
        if (dismissed) return;

        const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShow(true); };
        window.addEventListener('beforeinstallprompt', handler);

        // iOS hint (no native prompt available)
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIOS && !dismissed) setTimeout(() => setShow(true), 2000);

        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const install = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') setInstalled(true);
          setDeferredPrompt(null);
        }
        setShow(false);
      };

      const dismiss = () => { sessionStorage.setItem("pwa_dismissed","1"); setShow(false); };

      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

      if (!show || installed) return null;
      return (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:200, padding:"12px 16px 24px", background:"linear-gradient(to top, #141414, #141414)", borderTop:"1px solid #2a2a2a", boxShadow:"0 -8px 32px rgba(0,0,0,0.4)" }}>

            <div style={{ flex:1 }}>

              {isIOS && !deferredPrompt
                ? <div style={{ color:"#999999", fontSize:12, marginTop:3 }}>Tocca <strong style={{color:"#f5c400"}}>Condividi</strong> → <strong style={{color:"#f5c400"}}>Aggiungi a Home</strong> per installarla.</div>
                : <div style={{ color:"#999999", fontSize:12, marginTop:3 }}>Installala sul telefono per usarla anche offline.</div>
              }
              {deferredPrompt && (
                <button onClick={install} style={{ marginTop:8, padding:"8px 18px", borderRadius:8, border:"none", background:"linear-gradient(135deg,#f5c400,#d4a800)", color:"#000", fontWeight:700, fontSize:13, cursor:"pointer" }}>

            </div>
            <button onClick={dismiss} style={{ background:"none", border:"none", color:"#666666", fontSize:18, cursor:"pointer", padding:4, lineHeight:1 }}>✕</button>
          </div>
        </div>
      );
    }

    // ─── Login ────────────────────────────────────────────────────────────────

    function LoginScreen({ onLogin }) {

                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:36, fontWeight:900, letterSpacing:1, color:"#fff", lineHeight:1, textTransform:"uppercase" }}>SpesApp</div>

            {/* Form card */}

                    <input type={showPwd ? "text" : "password"} autoComplete="current-password"

    // ─── New Expense Modal ────────────────────────────────────────────────────

    function NewExpenseModal({ onClose, onSave, currentUserId, currentUserName, initialData }) {
      const isEdit = !!initialData;
      const [form, setForm] = useState(initialData ? {
        date: initialData.date, amount: String(initialData.amount),
        category: initialData.category, description: initialData.description, receipt: initialData.receipt,
        currency: initialData.currency || "EUR", sharedWith: initialData.sharedWith || ""
      } : { date: new Date().toISOString().split("T")[0], amount:"", category:"travel", description:"", receipt:false, currency:"EUR", sharedWith:"" });
      const [receiptPreview, setReceiptPreview] = useState(initialData?.receiptFull || initialData?.receiptPreview || null);
      const [receiptName, setReceiptName] = useState(initialData?.receipt ? "Scontrino esistente" : "");
      const [saving, setSaving] = useState(false);
      const [ocring, setOcring] = useState(false);
      const [ocrError, setOcrError] = useState("");
      const cameraRef = useRef();
      const galleryRef = useRef();

      const runOCR = async (base64Image) => {
        setOcring(true);
        setOcrError("");
        try {
          const mediaType = base64Image.split(";")[0].split(":")[1] || "image/jpeg";
          const base64Data = base64Image.split(",")[1];
          const resp = await fetch("/api/ocr", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: base64Data, mediaType })
          });
          if (!resp.ok) throw new Error(`Server error ${resp.status}`);
          const parsed = await resp.json();
          if (parsed.error) throw new Error(parsed.error);

          setForm(f => ({
            ...f,
            amount: parsed.importo != null ? String(parsed.importo) : f.amount,
            date: parsed.data || f.date,
            description: parsed.descrizione || f.description || "",
            category: parsed.categoria || f.category,
          }));
        } catch(e) {
          console.error("OCR error:", e);
          setOcrError("Non riesco a leggere lo scontrino. Compila manualmente.");
        } finally {
          setOcring(false);
        }
      };

      const compressImage = (dataUrl, maxPx = 1200, quality = 0.75) => new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = dataUrl;
      });

      const handleFile = async e => {
        const file = e.target.files[0];
        if (!file) return;
        setReceiptName(file.name);
        setForm(f => ({ ...f, receipt:true }));
        const reader = new FileReader();
        reader.onload = async ev => {
          const original = ev.target.result;
          setReceiptPreview(original);
          if (file.type.startsWith("image/")) {
            const compressed = await compressImage(original);
            runOCR(compressed);
          }
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const clearReceipt = () => { setReceiptPreview(null); setReceiptName(""); setOcrError(""); setForm(f => ({ ...f, receipt:false })); };

      const handleSave = () => {
        if (!form.amount || !form.description) return;
        setSaving(true);
        setTimeout(() => {
          if (isEdit) {
            onSave({ ...initialData, ...form, amount:parseFloat(form.amount), receiptPreview, receiptFull:receiptPreview });
          } else {
            onSave({ id:Date.now(), userId:currentUserId, userName:currentUserName, ...form, amount:parseFloat(form.amount), status:"pending", note:"", receiptPreview, receiptFull:receiptPreview });

        count: expenses.filter(e => e.userId===u.id).length
      })).sort((a,b) => b.total-a.total);

      const filtered = filterStatus==="all" ? expenses : expenses.filter(e => e.status===filterStatus);

      const handleAction = (id, status) => {
        onUpdateStatus(id, status, noteInput);
        setSelectedExpense(null);
        setNoteInput("");
      };

      const exportExcel = () => {
        const XLSX = window.XLSX;
        if (!XLSX) { alert("Libreria Excel non caricata, riprova."); return; }

        const today = new Date().toISOString().split("T")[0];
        const wb = XLSX.utils.book_new();

        // ── Foglio 1: Tutte le spese ──────────────────────────────────────
        const allRows = expenses.map(e => ({
          "ID":           e.id,
          "Dipendente":   e.userName,
          "Data":         e.date,
          "Importo":      parseFloat(e.amount),
          "Valuta":       e.currency || "EUR",
          "Categoria":    getCatInfo(e.category).label,
          "Descrizione":  e.description,
          "Con chi":      e.sharedWith || "",
          "Stato":        STATUS_CONFIG[e.status].label,
          "Scontrino":    e.receipt ? "Sì" : "No",
          "Note admin":   e.note || "",
        }));
        const ws1 = XLSX.utils.json_to_sheet(allRows);

        // Larghezze colonne
        ws1["!cols"] = [
          {wch:8}, {wch:20}, {wch:12}, {wch:10}, {wch:8},
          {wch:16}, {wch:40}, {wch:24}, {wch:12}, {wch:10}, {wch:24}
        ];
        XLSX.utils.book_append_sheet(wb, ws1, "Tutte le spese");

        // ── Foglio 2: Riepilogo per dipendente ────────────────────────────
        const byEmp = {};
        expenses.forEach(e => {
          if (!byEmp[e.userName]) byEmp[e.userName] = { tot: 0, approvato: 0, inAttesa: 0, rifiutato: 0, n: 0 };
          byEmp[e.userName].n++;
          byEmp[e.userName].tot += e.amount;
          if (e.status === "approved") byEmp[e.userName].approvato += e.amount;
          if (e.status === "pending")  byEmp[e.userName].inAttesa += e.amount;
          if (e.status === "rejected") byEmp[e.userName].rifiutato += e.amount;
        });
        const empRows = Object.entries(byEmp).map(([name, v]) => ({
          "Dipendente":       name,
          "N. spese":         v.n,
          "Totale (€)":       parseFloat(v.tot.toFixed(2)),
          "Approvato (€)":    parseFloat(v.approvato.toFixed(2)),
          "In attesa (€)":    parseFloat(v.inAttesa.toFixed(2)),
          "Rifiutato (€)":    parseFloat(v.rifiutato.toFixed(2)),
        }));
        const ws2 = XLSX.utils.json_to_sheet(empRows);
        ws2["!cols"] = [{wch:22},{wch:10},{wch:14},{wch:14},{wch:14},{wch:14}];
        XLSX.utils.book_append_sheet(wb, ws2, "Per dipendente");

        // ── Foglio 3: Riepilogo per categoria ─────────────────────────────
        const byCat = {};
        expenses.forEach(e => {
          const lbl = getCatInfo(e.category).label;
          if (!byCat[lbl]) byCat[lbl] = { tot: 0, n: 0 };
          byCat[lbl].n++;
          byCat[lbl].tot += e.amount;
        });
        const catRows = Object.entries(byCat)
          .sort((a,b) => b[1].tot - a[1].tot)
          .map(([cat, v]) => ({
            "Categoria":   cat,
            "N. spese":    v.n,
            "Totale (€)":  parseFloat(v.tot.toFixed(2)),
          }));
        const ws3 = XLSX.utils.json_to_sheet(catRows);
        ws3["!cols"] = [{wch:20},{wch:10},{wch:14}];
        XLSX.utils.book_append_sheet(wb, ws3, "Per categoria");

        // ── Download ──────────────────────────────────────────────────────
        XLSX.writeFile(wb, `SpesApp_Report_${today}.xlsx`);
      };

      const TABS = [
        { id:"dashboard", label:"Dashboard", icon:"📊" },

          <div style={{ maxWidth:800, margin:"0 auto", padding:"16px 14px" }}>

                {/* KPI strip */}

                  </div>

                    <div style={{ color:"#f5c400", fontSize:9, fontWeight:700, letterSpacing:2, textTransform:"uppercase", marginBottom:12 }}>Per Dipendente</div>
                    {byEmployee.map(emp => (
                      <div key={emp.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                        <Avatar name={emp.name} size={28} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ color:"#fff", fontSize:11, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{emp.name}</div>
                          <div style={{ color:"#444", fontSize:10 }}>{emp.count} spese</div>
                        </div>
                        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", color:"#f5c400", fontWeight:900, fontSize:14 }}>
                          {formatEur(emp.total)}{emp.totalUsd > 0 && <span style={{color:"#666", fontSize:10, marginLeft:3}}>+{formatAmount(emp.totalUsd,"USD")}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {pending.length>0 && (
                  <div style={{ background:"#111", border:"1px solid #1a1a1a", borderLeft:"3px solid #f59e0b", borderRadius:"0 6px 6px 0", padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div style={{ color:"#f59e0b", fontWeight:700, fontSize:13, letterSpacing:0.3 }}>⏳ {pending.length} spese in attesa di approvazione</div>
                    <button onClick={() => setActiveTab("expenses")} style={{ background:"#f5c400", border:"none", color:"#000", fontWeight:800, padding:"7px 14px", borderRadius:4, cursor:"pointer", fontSize:11, letterSpacing:0.5, textTransform:"uppercase" }}>Gestisci →</button>
                  </div>
                )}
              </>
            )}

            {activeTab==="expenses" && (
              <>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {["all","pending","approved","rejected"].map(s => (
                      <button key={s} onClick={() => setFilterStatus(s)}
                        style={{ padding:"6px 12px", borderRadius:20, border:"1px solid", borderColor: filterStatus===s ? "#f5c400" : "#2a2a2a", background: filterStatus===s ? "rgba(245,196,0,0.15)" : "none", color: filterStatus===s ? "#f5c400" : "#666666", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                        {s==="all" ? "Tutte" : STATUS_CONFIG[s]?.label}
                        {s==="pending" && pending.length>0 && <span style={{ marginLeft:3, background:"#f59e0b", color:"#000", fontSize:9, fontWeight:800, padding:"1px 4px", borderRadius:9 }}>{pending.length}</span>}
                      </button>
                    ))}
                  </div>
                  <button onClick={exportExcel} style={{ padding:"7px 12px", borderRadius:9, border:"1px solid #f5c400", background:"rgba(245,196,0,0.08)", color:"#f5c400", fontSize:12, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>📊 Excel</button>
                </div>

                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {filtered.map(exp => {
                    const cat = getCatInfo(exp.category);
                    return (
                      <div key={exp.id} style={{ background:"#141414", borderRadius:13, padding:"13px 14px", border: exp.status==="pending" ? "1px solid rgba(245,158,11,0.3)" : "1px solid #2a2a2a", display:"flex", alignItems:"center", gap:10 }}>
                        {exp.receiptFull || exp.receiptPreview ? (
                          <img src={exp.receiptFull || exp.receiptPreview} alt="" onClick={() => setViewReceipt(exp.receiptFull || exp.receiptPreview)}
                            style={{ width:40, height:40, borderRadius:9, objectFit:"cover", border:"2px solid #10b981", flexShrink:0, cursor:"pointer" }} />
                        ) : (
                          <div style={{ width:40, height:40, borderRadius:9, background:`${cat.color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, flexShrink:0 }}>{cat.icon}</div>
                        )}
                        <Avatar name={exp.userName} size={30} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ color:"#f1f5f9", fontWeight:600, fontSize:13 }}>{exp.description}</div>
                          <div style={{ color:"#666666", fontSize:11, marginTop:1 }}>
                            {exp.userName} · {exp.date} · {cat.label}
                            {!exp.receipt && <span style={{ color:"#ef4444" }}> · ⚠️ no scontrino</span>}
                          </div>
                          {exp.sharedWith && <div style={{ color:"#999999", fontSize:11 }}>👥 {exp.sharedWith}</div>}
                          {exp.note && <div style={{ color:"#999999", fontSize:11 }}>💬 {exp.note}</div>}
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          <div style={{ color:"#f1f5f9", fontWeight:700, fontSize:14, marginBottom:3 }}>{formatAmount(exp.amount, exp.currency || "EUR")}</div>
                          <StatusBadge status={exp.status} />
                        </div>
                        {exp.status==="pending" && (
                          <button onClick={() => { setSelectedExpense(exp); setNoteInput(""); }}
                            style={{ marginLeft:4, padding:"6px 11px", borderRadius:7, border:"1px solid #f5c400", background:"rgba(245,196,0,0.1)", color:"#f5c400", fontWeight:600, fontSize:12, cursor:"pointer", flexShrink:0 }}>
                            Esamina
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>

          {/* Approval modal */}
          {selectedExpense && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(5px)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }} onClick={e => e.target===e.currentTarget && setSelectedExpense(null)}>
              <div style={{ background:"#141414", borderRadius:"22px 22px 0 0", padding:"20px 20px 32px", width:"100%", maxWidth:480, border:"1px solid #2a2a2a", maxHeight:"80vh", overflowY:"auto" }}>
                <div style={{ width:36, height:4, borderRadius:2, background:"#2a2a2a", margin:"0 auto 16px" }} />
                <h2 style={{ color:"#f1f5f9", fontSize:16, fontWeight:800, margin:"0 0 16px" }}>Esamina Spesa</h2>
                <div style={{ background:"#000", borderRadius:10, padding:14, marginBottom:12 }}>
                  <div style={{ color:"#666666", fontSize:11, marginBottom:3 }}>{selectedExpense.date} · {getCatInfo(selectedExpense.category).label}</div>
                  <div style={{ color:"#f1f5f9", fontWeight:600, marginBottom:3 }}>{selectedExpense.description}</div>
                  <div style={{ color:"#f1f5f9", fontSize:20, fontWeight:800 }}>{formatAmount(selectedExpense.amount, selectedExpense.currency || "EUR")}</div>
                  <div style={{ color:"#666666", fontSize:11, marginTop:4 }}>👤 {selectedExpense.userName} {selectedExpense.receipt ? "· 📎 Scontrino allegato" : "· ⚠️ Nessun scontrino"}</div>
              {selectedExpense.sharedWith && <div style={{ color:"#999999", fontSize:11, marginTop:3 }}>👥 Con: {selectedExpense.sharedWith}</div>}
                </div>
                {(selectedExpense.receiptFull || selectedExpense.receiptPreview) && (
                  <div style={{ marginBottom:12, borderRadius:10, overflow:"hidden", border:"1px solid #2a2a2a", cursor:"pointer" }} onClick={() => setViewReceipt(selectedExpense.receiptFull || selectedExpense.receiptPreview)}>
                    <img src={selectedExpense.receiptFull || selectedExpense.receiptPreview} alt="Scontrino" style={{ width:"100%", maxHeight:180, objectFit:"cover", display:"block" }} />
                    <div style={{ background:"#000", padding:"6px 12px", color:"#666666", fontSize:11 }}>📷 Tocca per ingrandire</div>

    // ─── App Root — Supabase Cloud ────────────────────────────────────────────

    function App() {
      const [currentUser, setCurrentUser] = useState(() => loadSession());
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [dbError, setDbError] = useState("");

      // Load expenses from cloud on mount and after login
      useEffect(() => {
        if (!currentUser) { setLoading(false); return; }
        setLoading(true);
        setDbError("");
        loadExpensesFromCloud()
          .then(rows => { setExpenses(rows); setLoading(false); })
          .catch(e => { setDbError("Errore connessione database. Riprova."); setLoading(false); });
      }, [currentUser]);

      const handleLogin = user => {
        sessionStorage.setItem("spesapp_user", JSON.stringify(user));
        setCurrentUser(user);
      };

      const handleLogout = () => {
        sessionStorage.removeItem("spesapp_user");
        setCurrentUser(null);
        setExpenses([]);
      };

      const handleAddExpense = useCallback(async exp => {
        try {
          // Rimuovi immagini dall'oggetto prima di inviare al DB (troppo grandi)
          const imageData = exp.receiptFull || exp.receiptPreview;
          const expenseForDb = { ...exp, receiptPreview: null, receiptFull: null };

          const saved = await dbFetch("add", { expense: expenseForDb });

          // Mostra subito con anteprima locale
          if (imageData) saveImageLocal(saved.id, imageData);
          setExpenses(prev => [{ ...saved, receiptFull: imageData, receiptPreview: imageData }, ...prev]);

          // Upload foto su Supabase Storage in background
          if (imageData) {
            const cloudUrl = await uploadImageToCloud(saved.id, imageData);
            if (cloudUrl) {
              await dbFetch("updateReceiptUrl", { id: saved.id, url: cloudUrl });
              setExpenses(prev => prev.map(e => e.id === saved.id
                ? { ...e, receiptFull: cloudUrl, receiptPreview: cloudUrl }
                : e
              ));
            }
          }
        } catch(e) { alert("Errore salvataggio: " + e.message); }
      }, []);

      const handleUpdateStatus = useCallback(async (id, status, note) => {
        try {
          const updated = await dbFetch("updateStatus", { id, status, note });
          // Recupera immagine: prima da URL cloud, poi da cache locale
          const cloudUrl = updated.receiptUrl;
          const localImg = loadImageLocal(id);
          const imgSrc = cloudUrl || localImg;
          const withImg = imgSrc ? { ...updated, receiptFull: imgSrc, receiptPreview: imgSrc } : updated;
          setExpenses(prev => prev.map(e => e.id===id ? withImg : e));
        } catch(e) { alert("Errore aggiornamento: " + e.message); }
      }, []);

      const handleEditExpense = useCallback(async exp => {
        try {
          const imageData = exp.receiptFull || exp.receiptPreview;
          const expenseForDb = { ...exp, receiptPreview: null, receiptFull: null };

          const updated = await dbFetch("edit", { expense: expenseForDb });

          // Aggiorna cache locale
          if (imageData) saveImageLocal(exp.id, imageData);
          const withImg = imageData ? { ...updated, receiptFull: imageData, receiptPreview: imageData } : updated;
          setExpenses(prev => prev.map(e => e.id===exp.id ? withImg : e));

          // Upload nuova foto se cambiata e non è già un URL cloud
          if (imageData && !imageData.startsWith("http")) {
            const cloudUrl = await uploadImageToCloud(exp.id, imageData);
            if (cloudUrl) {
              await dbFetch("updateReceiptUrl", { id: exp.id, url: cloudUrl });
              setExpenses(prev => prev.map(e => e.id===exp.id
                ? { ...e, receiptFull: cloudUrl, receiptPreview: cloudUrl }
                : e
              ));
            }
          }
        } catch(e) { alert("Errore modifica: " + e.message); }
      }, []);

      const handleDeleteExpense = useCallback(async id => {
        try {
          await dbFetch("delete", { id });
          deleteImageLocal(id);
          deleteImageFromCloud(id); // async, non bloccante
          setExpenses(prev => prev.filter(e => e.id !== id));
        } catch(e) { alert("Errore eliminazione: " + e.message); }
      }, []);

      if (!currentUser) return <LoginScreen onLogin={handleLogin} />;

      if (loading) return (
        <div style={{ minHeight:"100vh", background:"#000", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
          <div style={{ width:24, height:24, border:"3px solid #f5c400", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
          <div style={{ color:"#555", fontSize:12, letterSpacing:2, textTransform:"uppercase" }}>Caricamento dati...</div>
        </div>
      );

      if (dbError) return (
        <div style={{ minHeight:"100vh", background:"#000", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, padding:24 }}>
          <div style={{ fontSize:32 }}>⚠️</div>
          <div style={{ color:"#ef4444", fontWeight:700, textAlign:"center" }}>{dbError}</div>
          <button onClick={() => { setDbError(""); setLoading(true); loadExpensesFromCloud().then(r => { setExpenses(r); setLoading(false); }).catch(() => setDbError("Errore connessione database. Riprova.")); }}
            style={{ padding:"10px 24px", background:"#f5c400", border:"none", borderRadius:6, fontWeight:800, cursor:"pointer", fontSize:13 }}>
            Riprova
          </button>
        </div>
      );

      if (currentUser.role==="admin") return <AdminView user={currentUser} expenses={expenses} onUpdateStatus={handleUpdateStatus} onLogout={handleLogout} />;
      return <EmployeeView user={currentUser} expenses={expenses} onAddExpense={handleAddExpense} onEditExpense={handleEditExpense} onDeleteExpense={handleDeleteExpense} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

    // Register Service Worker
