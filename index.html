<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SpesApp" />
  <title>SpesApp — Note Spese</title>
  <link rel="manifest" href="manifest.json" />
  <!-- Apple touch icon fallback (emoji-based, generated inline) -->
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    input, button { font-family: inherit; }
    /* Safe area for notched phones */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ─── Constants ────────────────────────────────────────────────────────────

    const CATEGORIES = [
      { id: "travel",    label: "Viaggio",        icon: "✈️",  color: "#3b82f6" },
      { id: "meals",     label: "Pasti",           icon: "🍽️", color: "#f59e0b" },
      { id: "hotel",     label: "Alloggio",        icon: "🏨",  color: "#8b5cf6" },
      { id: "fuel",      label: "Carburante",      icon: "⛽",  color: "#ef4444" },
      { id: "client",    label: "Rappresentanza",  icon: "🤝",  color: "#10b981" },
      { id: "materials", label: "Materiali",       icon: "📦",  color: "#6366f1" },
      { id: "other",     label: "Altro",           icon: "📋",  color: "#6b7280" },
    ];

    const USERS = [
      { id: 1, name: "Admin",          role: "admin" },
      { id: 2, name: "Marco Ferretti", role: "employee" },
      { id: 3, name: "Giulia Morandi", role: "employee" },
      { id: 4, name: "Luca Ricci",     role: "employee" },
      { id: 5, name: "Sara Bianchi",   role: "employee" },
    ];

    const MOCK_EXPENSES = [
      { id: 1, userId: 2, userName: "Marco Ferretti", date: "2026-03-28", amount: 142.50, category: "travel",    description: "Treno Bologna-Milano A/R",        status: "pending",  receipt: true,  note: "",              receiptPreview: null },
      { id: 2, userId: 3, userName: "Giulia Morandi", date: "2026-03-27", amount: 87.00,  category: "meals",     description: "Pranzo con cliente Bonfiglioli",  status: "approved", receipt: true,  note: "Approvato",     receiptPreview: null },
      { id: 3, userId: 2, userName: "Marco Ferretti", date: "2026-03-25", amount: 320.00, category: "hotel",     description: "Hotel Milano 2 notti",            status: "approved", receipt: true,  note: "",              receiptPreview: null },
      { id: 4, userId: 4, userName: "Luca Ricci",     date: "2026-03-24", amount: 65.30,  category: "fuel",      description: "Rifornimento auto aziendale",     status: "rejected", receipt: false, note: "Manca scontrino", receiptPreview: null },
      { id: 5, userId: 3, userName: "Giulia Morandi", date: "2026-03-22", amount: 210.00, category: "client",    description: "Cena rappresentanza cliente Sacmi", status: "pending", receipt: true,  note: "",              receiptPreview: null },
      { id: 6, userId: 4, userName: "Luca Ricci",     date: "2026-03-20", amount: 45.00,  category: "materials", description: "Cartucce stampante ufficio",       status: "approved", receipt: true,  note: "",              receiptPreview: null },
      { id: 7, userId: 2, userName: "Marco Ferretti", date: "2026-03-18", amount: 33.50,  category: "meals",     description: "Pranzo trasferta Modena",          status: "approved", receipt: true,  note: "",              receiptPreview: null },
      { id: 8, userId: 5, userName: "Sara Bianchi",   date: "2026-03-15", amount: 189.00, category: "travel",    description: "Volo Bologna-Roma",               status: "pending",  receipt: true,  note: "",              receiptPreview: null },
    ];

    const STATUS_CONFIG = {
      pending:  { label: "In attesa", color: "#f59e0b", bg: "#fef3c720", dot: "#f59e0b" },
      approved: { label: "Approvata", color: "#10b981", bg: "#d1fae520", dot: "#10b981" },
      rejected: { label: "Rifiutata", color: "#ef4444", bg: "#fee2e220", dot: "#ef4444" },
    };

    // ─── Persistence ─────────────────────────────────────────────────────────

    function loadExpenses() {
      try {
        const raw = localStorage.getItem("spesapp_expenses");
        return raw ? JSON.parse(raw) : MOCK_EXPENSES;
      } catch { return MOCK_EXPENSES; }
    }

    function saveExpenses(expenses) {
      try {
        // Avoid storing large base64 images — store only metadata + small thumb
        const toStore = expenses.map(e => ({
          ...e,
          receiptPreview: e.receiptPreview
            ? e.receiptPreview.substring(0, 500) + "..." // truncate for storage
            : null,
          receiptFull: e.receiptFull || e.receiptPreview || null
        }));
        localStorage.setItem("spesapp_expenses", JSON.stringify(toStore));
      } catch(err) {
        // localStorage full (likely due to images) — store without previews
        try {
          const minimal = expenses.map(e => ({ ...e, receiptPreview: null, receiptFull: null }));
          localStorage.setItem("spesapp_expenses", JSON.stringify(minimal));
        } catch {}
      }
    }

    function loadSession() {
      try {
        const raw = sessionStorage.getItem("spesapp_user");
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    // ─── Helpers ─────────────────────────────────────────────────────────────

    const formatEur = n => new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR" }).format(n);
    const getCatInfo = id => CATEGORIES.find(c => c.id === id) || CATEGORIES[6];

    // ─── Shared UI ───────────────────────────────────────────────────────────

    function StatusBadge({ status }) {
      const cfg = STATUS_CONFIG[status];
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:700, color:cfg.color, background:cfg.bg, border:`1px solid ${cfg.color}40` }}>
          <span style={{ width:5, height:5, borderRadius:"50%", background:cfg.dot, display:"inline-block" }} />
          {cfg.label}
        </span>
      );
    }

    function Avatar({ name, size = 36 }) {
      const initials = name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
      const palette = ["#3b82f6","#8b5cf6","#10b981","#f59e0b","#ef4444","#ec4899"];
      const color = palette[name.charCodeAt(0) % palette.length];
      return (
        <div style={{ width:size, height:size, borderRadius:"50%", background:color, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:800, fontSize:size*0.36, flexShrink:0, letterSpacing:-0.5 }}>
          {initials}
        </div>
      );
    }

    // ─── Install Banner ───────────────────────────────────────────────────────

    function InstallBanner() {
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [show, setShow] = useState(false);
      const [installed, setInstalled] = useState(false);

      useEffect(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) return;
        const dismissed = sessionStorage.getItem("pwa_dismissed");
        if (dismissed) return;

        const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShow(true); };
        window.addEventListener('beforeinstallprompt', handler);

        // iOS hint (no native prompt available)
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIOS && !dismissed) setTimeout(() => setShow(true), 2000);

        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const install = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') setInstalled(true);
          setDeferredPrompt(null);
        }
        setShow(false);
      };

      const dismiss = () => { sessionStorage.setItem("pwa_dismissed","1"); setShow(false); };

      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

      if (!show || installed) return null;
      return (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:200, padding:"12px 16px 24px", background:"linear-gradient(to top, #1e293b, #1e293b)", borderTop:"1px solid #334155", boxShadow:"0 -8px 32px rgba(0,0,0,0.4)" }}>
          <div style={{ display:"flex", alignItems:"flex-start", gap:12, maxWidth:480, margin:"0 auto" }}>
            <div style={{ width:44, height:44, borderRadius:12, background:"linear-gradient(135deg,#3b82f6,#6366f1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>💼</div>
            <div style={{ flex:1 }}>
              <div style={{ color:"#f1f5f9", fontWeight:700, fontSize:14 }}>Installa SpesApp</div>
              {isIOS && !deferredPrompt
                ? <div style={{ color:"#94a3b8", fontSize:12, marginTop:3 }}>Tocca <strong style={{color:"#3b82f6"}}>Condividi</strong> → <strong style={{color:"#3b82f6"}}>Aggiungi a Home</strong> per installarla.</div>
                : <div style={{ color:"#94a3b8", fontSize:12, marginTop:3 }}>Installala sul telefono per usarla anche offline.</div>
              }
              {deferredPrompt && (
                <button onClick={install} style={{ marginTop:8, padding:"8px 18px", borderRadius:8, border:"none", background:"linear-gradient(135deg,#3b82f6,#6366f1)", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer" }}>
                  Installa ora
                </button>
              )}
            </div>
            <button onClick={dismiss} style={{ background:"none", border:"none", color:"#64748b", fontSize:18, cursor:"pointer", padding:4, lineHeight:1 }}>✕</button>
          </div>
        </div>
      );
    }

    // ─── Login ────────────────────────────────────────────────────────────────

    function LoginScreen({ onLogin }) {
      const [selected, setSelected] = useState(null);
      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 16px" }}>
          <div style={{ marginBottom:32, textAlign:"center" }}>
            <div style={{ width:68, height:68, borderRadius:20, background:"linear-gradient(135deg,#3b82f6,#6366f1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, margin:"0 auto 14px", boxShadow:"0 8px 32px rgba(99,102,241,0.4)" }}>💼</div>
            <h1 style={{ color:"#f8fafc", fontSize:26, fontWeight:800, margin:0, letterSpacing:-0.5 }}>SpesApp</h1>
            <p style={{ color:"#64748b", margin:"5px 0 0", fontSize:13 }}>MyCrypto S.r.l. — Gestione Note Spese</p>
          </div>

          <div style={{ background:"#1e293b", borderRadius:20, padding:"24px 20px", width:"100%", maxWidth:380, border:"1px solid #334155", boxShadow:"0 24px 60px rgba(0,0,0,0.5)" }}>
            <p style={{ color:"#64748b", fontSize:12, marginBottom:14, textAlign:"center", fontWeight:600, letterSpacing:0.5 }}>SELEZIONA UTENTE (DEMO)</p>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {USERS.map(u => (
                <button key={u.id} onClick={() => setSelected(u.id)}
                  style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", borderRadius:12, cursor:"pointer", border: selected===u.id ? "2px solid #3b82f6" : "2px solid #334155", background: selected===u.id ? "rgba(59,130,246,0.1)" : "#0f172a", transition:"all 0.15s", width:"100%", textAlign:"left" }}>
                  <Avatar name={u.name} size={38} />
                  <div>
                    <div style={{ color:"#f1f5f9", fontWeight:600, fontSize:14 }}>{u.name}</div>
                    <div style={{ color:"#64748b", fontSize:12 }}>{u.role==="admin" ? "👑 Amministratore" : "👤 Dipendente"}</div>
                  </div>
                  {selected===u.id && <span style={{ marginLeft:"auto", color:"#3b82f6", fontSize:18 }}>✓</span>}
                </button>
              ))}
            </div>
            <button onClick={() => selected && onLogin(USERS.find(u => u.id===selected))}
              disabled={!selected}
              style={{ width:"100%", marginTop:16, padding:"14px", borderRadius:12, border:"none", background: selected ? "linear-gradient(135deg,#3b82f6,#6366f1)" : "#1e293b", color: selected ? "#fff" : "#475569", fontWeight:700, fontSize:15, cursor: selected ? "pointer" : "default", transition:"all 0.2s", boxShadow: selected ? "0 4px 20px rgba(99,102,241,0.4)" : "none" }}>
              Accedi
            </button>
          </div>
        </div>
      );
    }

    // ─── New Expense Modal ────────────────────────────────────────────────────

    function NewExpenseModal({ onClose, onSave, currentUserId, currentUserName }) {
      const [form, setForm] = useState({ date: new Date().toISOString().split("T")[0], amount:"", category:"travel", description:"", receipt:false });
      const [receiptPreview, setReceiptPreview] = useState(null);
      const [receiptName, setReceiptName] = useState("");
      const [saving, setSaving] = useState(false);
      const cameraRef = useRef();
      const galleryRef = useRef();

      const handleFile = e => {
        const file = e.target.files[0];
        if (!file) return;
        setReceiptName(file.name);
        setForm(f => ({ ...f, receipt:true }));
        const reader = new FileReader();
        reader.onload = ev => setReceiptPreview(ev.target.result);
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const clearReceipt = () => { setReceiptPreview(null); setReceiptName(""); setForm(f => ({ ...f, receipt:false })); };

      const handleSave = () => {
        if (!form.amount || !form.description) return;
        setSaving(true);
        setTimeout(() => {
          onSave({ id:Date.now(), userId:currentUserId, userName:currentUserName, ...form, amount:parseFloat(form.amount), status:"pending", note:"", receiptPreview, receiptFull:receiptPreview });
          onClose();
        }, 300);
      };

      const valid = form.amount && form.description;

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(6px)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }} onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{ background:"#1e293b", borderRadius:"22px 22px 0 0", padding:"20px 20px 0", width:"100%", maxWidth:520, border:"1px solid #334155", boxShadow:"0 -24px 60px rgba(0,0,0,0.6)", maxHeight:"92vh", overflowY:"auto", paddingBottom:"calc(24px + env(safe-area-inset-bottom, 0px))" }}>
            <div style={{ width:36, height:4, borderRadius:2, background:"#334155", margin:"0 auto 18px" }} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <h2 style={{ color:"#f1f5f9", fontSize:17, fontWeight:800, margin:0 }}>Nuova Spesa</h2>
              <button onClick={onClose} style={{ background:"#0f172a", border:"1px solid #334155", color:"#94a3b8", width:30, height:30, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:13 }}>✕</button>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <div>
                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>DATA</label>
                  <input type="date" value={form.date} onChange={e => setForm({...form, date:e.target.value})}
                    style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
                </div>
                <div>
                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>IMPORTO (€)</label>
                  <input type="number" inputMode="decimal" placeholder="0.00" value={form.amount} onChange={e => setForm({...form, amount:e.target.value})}
                    style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
                </div>
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:7, letterSpacing:0.8 }}>CATEGORIA</label>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                  {CATEGORIES.map(cat => (
                    <button key={cat.id} onClick={() => setForm({...form, category:cat.id})}
                      style={{ padding:"6px 11px", borderRadius:20, border:"2px solid", borderColor: form.category===cat.id ? cat.color : "#334155", background: form.category===cat.id ? `${cat.color}20` : "#0f172a", color: form.category===cat.id ? cat.color : "#64748b", fontSize:12, fontWeight:600, cursor:"pointer", transition:"all 0.15s" }}>
                      {cat.icon} {cat.label}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>DESCRIZIONE</label>
                <input type="text" placeholder="Descrivi la spesa..." value={form.description} onChange={e => setForm({...form, description:e.target.value})}
                  style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
              </div>

              <div>
                <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:8, letterSpacing:0.8 }}>SCONTRINO / RICEVUTA</label>
                <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{ display:"none" }} onChange={handleFile} />
                <input ref={galleryRef} type="file" accept="image/*,application/pdf" style={{ display:"none" }} onChange={handleFile} />

                {!receiptPreview ? (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    <button onClick={() => cameraRef.current.click()}
                      style={{ padding:"20px 12px", borderRadius:14, border:"2px dashed #334155", background:"#0f172a", color:"#94a3b8", fontSize:13, fontWeight:600, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:28 }}>📷</span><span>Fotocamera</span>
                    </button>
                    <button onClick={() => galleryRef.current.click()}
                      style={{ padding:"20px 12px", borderRadius:14, border:"2px dashed #334155", background:"#0f172a", color:"#94a3b8", fontSize:13, fontWeight:600, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:28 }}>🖼️</span><span>Galleria / PDF</span>
                    </button>
                  </div>
                ) : (
                  <div style={{ borderRadius:14, overflow:"hidden", border:"2px solid #10b981", position:"relative" }}>
                    <img src={receiptPreview} alt="Scontrino" style={{ width:"100%", maxHeight:200, objectFit:"cover", display:"block" }} />
                    <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%)", display:"flex", alignItems:"flex-end", padding:10, justifyContent:"space-between" }}>
                      <div style={{ color:"#fff", fontSize:11, fontWeight:600 }}>✅ {receiptName || "Allegato"}</div>
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={() => cameraRef.current.click()} style={{ padding:"5px 10px", borderRadius:7, border:"none", background:"rgba(255,255,255,0.2)", color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer", backdropFilter:"blur(4px)" }}>📷 Rifai</button>
                        <button onClick={clearReceipt} style={{ padding:"5px 10px", borderRadius:7, border:"none", background:"rgba(239,68,68,0.7)", color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer" }}>Rimuovi</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div style={{ display:"flex", gap:10, marginTop:20, marginBottom:4 }}>
              <button onClick={onClose} style={{ flex:1, padding:13, borderRadius:12, border:"1px solid #334155", background:"none", color:"#94a3b8", fontWeight:600, cursor:"pointer" }}>Annulla</button>
              <button onClick={handleSave} disabled={!valid || saving}
                style={{ flex:2, padding:13, borderRadius:12, border:"none", background: valid ? "linear-gradient(135deg,#3b82f6,#6366f1)" : "#334155", color: valid ? "#fff" : "#64748b", fontWeight:700, fontSize:15, cursor: valid ? "pointer" : "default", boxShadow: valid ? "0 4px 16px rgba(99,102,241,0.4)" : "none", transition:"all 0.2s" }}>
                {saving ? "Invio..." : "Invia Spesa"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Employee View ────────────────────────────────────────────────────────

    function EmployeeView({ user, expenses, onAddExpense, onLogout }) {
      const [showModal, setShowModal] = useState(false);
      const [viewReceipt, setViewReceipt] = useState(null);
      const myExpenses = expenses.filter(e => e.userId === user.id);
      const total    = myExpenses.reduce((s,e) => s+e.amount, 0);
      const approved = myExpenses.filter(e => e.status==="approved").reduce((s,e) => s+e.amount, 0);
      const pending  = myExpenses.filter(e => e.status==="pending").reduce((s,e) => s+e.amount, 0);

      return (
        <div style={{ minHeight:"100vh", background:"#0f172a", paddingBottom:80 }}>
          {/* Header */}
          <div style={{ background:"#1e293b", borderBottom:"1px solid #334155", padding:"14px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:34, height:34, borderRadius:9, background:"linear-gradient(135deg,#3b82f6,#6366f1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>💼</div>
              <div>
                <div style={{ color:"#f1f5f9", fontWeight:800, fontSize:14 }}>SpesApp</div>
                <div style={{ color:"#64748b", fontSize:11 }}>Le mie spese</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <Avatar name={user.name} size={32} />
              <button onClick={onLogout} style={{ background:"none", border:"1px solid #334155", color:"#94a3b8", padding:"5px 10px", borderRadius:7, cursor:"pointer", fontSize:11, fontWeight:600 }}>Esci</button>
            </div>
          </div>

          <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 14px" }}>
            <div style={{ marginBottom:20 }}>
              <h1 style={{ color:"#f8fafc", fontSize:20, fontWeight:800, margin:0 }}>Ciao, {user.name.split(" ")[0]} 👋</h1>
              <p style={{ color:"#64748b", margin:"3px 0 0", fontSize:13 }}>Riepilogo note spese</p>
            </div>

            {/* Stats */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:20 }}>
              {[
                { label:"Totale", value:formatEur(total), color:"#3b82f6" },
                { label:"Approvato", value:formatEur(approved), color:"#10b981" },
                { label:"In attesa", value:formatEur(pending), color:"#f59e0b" },
              ].map(s => (
                <div key={s.label} style={{ background:"#1e293b", borderRadius:14, padding:"14px 12px", border:"1px solid #334155" }}>
                  <div style={{ color:"#64748b", fontSize:10, fontWeight:700, marginBottom:5, letterSpacing:0.5 }}>{s.label.toUpperCase()}</div>
                  <div style={{ color:s.color, fontSize:15, fontWeight:800 }}>{s.value}</div>
                </div>
              ))}
            </div>

            {/* Add button */}
            <button onClick={() => setShowModal(true)}
              style={{ width:"100%", padding:14, borderRadius:14, border:"2px dashed #334155", background:"rgba(59,130,246,0.05)", color:"#3b82f6", fontWeight:700, fontSize:15, cursor:"pointer", marginBottom:18, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              <span style={{ fontSize:20, lineHeight:1 }}>+</span> Nuova Nota Spesa
            </button>

            {/* List */}
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {myExpenses.length===0 && (
                <div style={{ textAlign:"center", padding:40, color:"#64748b" }}>
                  <div style={{ fontSize:36, marginBottom:10 }}>📭</div>
                  <div>Nessuna spesa inserita</div>
                </div>
              )}
              {myExpenses.map(exp => {
                const cat = getCatInfo(exp.category);
                return (
                  <div key={exp.id} style={{ background:"#1e293b", borderRadius:14, padding:"14px 16px", border:"1px solid #334155", display:"flex", alignItems:"center", gap:12 }}>
                    {exp.receiptFull || exp.receiptPreview ? (
                      <img src={exp.receiptFull || exp.receiptPreview} alt="scontrino" onClick={() => setViewReceipt(exp.receiptFull || exp.receiptPreview)}
                        style={{ width:46, height:46, borderRadius:10, objectFit:"cover", border:"2px solid #10b981", flexShrink:0, cursor:"pointer" }} />
                    ) : (
                      <div style={{ width:46, height:46, borderRadius:10, background:`${cat.color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{cat.icon}</div>
                    )}
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ color:"#f1f5f9", fontWeight:600, fontSize:14, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{exp.description}</div>
                      <div style={{ color:"#64748b", fontSize:12, marginTop:2 }}>{cat.label} · {exp.date} {exp.receipt && "· 📎"}</div>
                      {exp.note && <div style={{ color:"#f59e0b", fontSize:11, marginTop:2 }}>⚠️ {exp.note}</div>}
                    </div>
                    <div style={{ textAlign:"right", flexShrink:0 }}>
                      <div style={{ color:"#f1f5f9", fontWeight:800, fontSize:15 }}>{formatEur(exp.amount)}</div>
                      <div style={{ marginTop:4 }}><StatusBadge status={exp.status} /></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {showModal && <NewExpenseModal onClose={() => setShowModal(false)} onSave={onAddExpense} currentUserId={user.id} currentUserName={user.name} />}

          {/* Receipt lightbox */}
          {viewReceipt && (
            <div onClick={() => setViewReceipt(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
              <img src={viewReceipt} alt="Scontrino" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:12, objectFit:"contain" }} />
              <button onClick={() => setViewReceipt(null)} style={{ position:"absolute", top:20, right:20, background:"rgba(255,255,255,0.15)", border:"none", color:"#fff", width:36, height:36, borderRadius:"50%", fontSize:18, cursor:"pointer" }}>✕</button>
            </div>
          )}
          <InstallBanner />
        </div>
      );
    }

    // ─── Admin View ───────────────────────────────────────────────────────────

    function AdminView({ user, expenses, onUpdateStatus, onLogout }) {
      const [activeTab, setActiveTab] = useState("dashboard");
      const [filterStatus, setFilterStatus] = useState("all");
      const [selectedExpense, setSelectedExpense] = useState(null);
      const [noteInput, setNoteInput] = useState("");
      const [viewReceipt, setViewReceipt] = useState(null);

      const pending  = expenses.filter(e => e.status==="pending");
      const totalAll = expenses.reduce((s,e) => s+e.amount, 0);
      const totalApproved = expenses.filter(e => e.status==="approved").reduce((s,e) => s+e.amount, 0);

      const byCategory = CATEGORIES.map(cat => ({
        ...cat, total: expenses.filter(e => e.category===cat.id).reduce((s,e) => s+e.amount, 0)
      })).filter(c => c.total>0).sort((a,b) => b.total-a.total);

      const byEmployee = USERS.filter(u => u.role==="employee").map(u => ({
        ...u,
        total: expenses.filter(e => e.userId===u.id).reduce((s,e) => s+e.amount, 0),
        count: expenses.filter(e => e.userId===u.id).length
      })).sort((a,b) => b.total-a.total);

      const filtered = filterStatus==="all" ? expenses : expenses.filter(e => e.status===filterStatus);

      const handleAction = (id, status) => {
        onUpdateStatus(id, status, noteInput);
        setSelectedExpense(null);
        setNoteInput("");
      };

      const exportCSV = () => {
        const rows = [["ID","Dipendente","Data","Importo","Categoria","Descrizione","Stato","Scontrino"]];
        expenses.forEach(e => {
          const cat = getCatInfo(e.category);
          rows.push([e.id, e.userName, e.date, e.amount.toFixed(2), cat.label, `"${e.description}"`, STATUS_CONFIG[e.status].label, e.receipt ? "Sì" : "No"]);
        });
        const csv = rows.map(r => r.join(";")).join("\n");
        const blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
        a.download = `spese_${new Date().toISOString().split("T")[0]}.csv`; a.click();
      };

      const TABS = [
        { id:"dashboard", label:"Dashboard", icon:"📊" },
        { id:"expenses",  label:`Spese${pending.length ? ` (${pending.length})` : ""}`, icon:"📋" },
      ];

      return (
        <div style={{ minHeight:"100vh", background:"#0f172a", paddingBottom:60 }}>
          {/* Header */}
          <div style={{ background:"#1e293b", borderBottom:"1px solid #334155", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:34, height:34, borderRadius:9, background:"linear-gradient(135deg,#3b82f6,#6366f1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>💼</div>
                <div style={{ color:"#f1f5f9", fontWeight:800, fontSize:14 }}>SpesApp <span style={{ color:"#6366f1", fontSize:10, fontWeight:700, background:"rgba(99,102,241,0.15)", padding:"2px 6px", borderRadius:5, marginLeft:3 }}>ADMIN</span></div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <Avatar name={user.name} size={30} />
                <button onClick={onLogout} style={{ background:"none", border:"1px solid #334155", color:"#94a3b8", padding:"5px 10px", borderRadius:7, cursor:"pointer", fontSize:11, fontWeight:600 }}>Esci</button>
              </div>
            </div>
            <div style={{ display:"flex", gap:0, paddingLeft:8 }}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)}
                  style={{ padding:"10px 14px", border:"none", background:"none", color: activeTab===t.id ? "#3b82f6" : "#64748b", fontWeight:700, fontSize:13, cursor:"pointer", borderBottom: activeTab===t.id ? "2px solid #3b82f6" : "2px solid transparent", transition:"all 0.15s" }}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>

          <div style={{ maxWidth:800, margin:"0 auto", padding:"20px 14px" }}>
            {activeTab==="dashboard" && (
              <>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, marginBottom:20 }}>
                  {[
                    { label:"Totale Spese", value:formatEur(totalAll), icon:"💳", color:"#3b82f6" },
                    { label:"Approvato", value:formatEur(totalApproved), icon:"✅", color:"#10b981" },
                    { label:"In Attesa", value:`${pending.length} richieste`, icon:"⏳", color:"#f59e0b" },
                    { label:"Dipendenti", value:`${byEmployee.length} attivi`, icon:"👥", color:"#8b5cf6" },
                  ].map(k => (
                    <div key={k.label} style={{ background:"#1e293b", borderRadius:14, padding:"16px 14px", border:"1px solid #334155" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div>
                          <div style={{ color:"#64748b", fontSize:10, fontWeight:700, marginBottom:6, letterSpacing:0.5 }}>{k.label.toUpperCase()}</div>
                          <div style={{ color:k.color, fontSize:18, fontWeight:800 }}>{k.value}</div>
                        </div>
                        <span style={{ fontSize:20 }}>{k.icon}</span>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  <div style={{ background:"#1e293b", borderRadius:14, padding:18, border:"1px solid #334155" }}>
                    <h3 style={{ color:"#f1f5f9", fontSize:13, fontWeight:700, margin:"0 0 14px" }}>Per Categoria</h3>
                    {byCategory.map(cat => {
                      const pct = totalAll>0 ? (cat.total/totalAll)*100 : 0;
                      return (
                        <div key={cat.id} style={{ marginBottom:10 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                            <span style={{ color:"#94a3b8", fontSize:12 }}>{cat.icon} {cat.label}</span>
                            <span style={{ color:"#f1f5f9", fontWeight:600, fontSize:12 }}>{formatEur(cat.total)}</span>
                          </div>
                          <div style={{ height:5, borderRadius:3, background:"#334155" }}>
                            <div style={{ height:"100%", width:`${pct}%`, background:cat.color, borderRadius:3, transition:"width 0.8s" }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ background:"#1e293b", borderRadius:14, padding:18, border:"1px solid #334155" }}>
                    <h3 style={{ color:"#f1f5f9", fontSize:13, fontWeight:700, margin:"0 0 14px" }}>Per Dipendente</h3>
                    {byEmployee.map(emp => (
                      <div key={emp.id} style={{ display:"flex", alignItems:"center", gap:9, marginBottom:10 }}>
                        <Avatar name={emp.name} size={30} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ color:"#f1f5f9", fontSize:12, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{emp.name}</div>
                          <div style={{ color:"#64748b", fontSize:11 }}>{emp.count} spese</div>
                        </div>
                        <div style={{ color:"#f1f5f9", fontWeight:700, fontSize:13 }}>{formatEur(emp.total)}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {pending.length>0 && (
                  <div style={{ marginTop:16, background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.3)", borderRadius:12, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div style={{ color:"#f59e0b", fontWeight:600, fontSize:13 }}>⏳ {pending.length} spese in attesa</div>
                    <button onClick={() => setActiveTab("expenses")} style={{ background:"#f59e0b", border:"none", color:"#000", fontWeight:700, padding:"6px 12px", borderRadius:7, cursor:"pointer", fontSize:12 }}>Gestisci →</button>
                  </div>
                )}
              </>
            )}

            {activeTab==="expenses" && (
              <>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {["all","pending","approved","rejected"].map(s => (
                      <button key={s} onClick={() => setFilterStatus(s)}
                        style={{ padding:"6px 12px", borderRadius:20, border:"1px solid", borderColor: filterStatus===s ? "#3b82f6" : "#334155", background: filterStatus===s ? "rgba(59,130,246,0.15)" : "none", color: filterStatus===s ? "#3b82f6" : "#64748b", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                        {s==="all" ? "Tutte" : STATUS_CONFIG[s]?.label}
                        {s==="pending" && pending.length>0 && <span style={{ marginLeft:3, background:"#f59e0b", color:"#000", fontSize:9, fontWeight:800, padding:"1px 4px", borderRadius:9 }}>{pending.length}</span>}
                      </button>
                    ))}
                  </div>
                  <button onClick={exportCSV} style={{ padding:"7px 12px", borderRadius:9, border:"1px solid #334155", background:"#1e293b", color:"#94a3b8", fontSize:12, fontWeight:600, cursor:"pointer" }}>📥 CSV</button>
                </div>

                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {filtered.map(exp => {
                    const cat = getCatInfo(exp.category);
                    return (
                      <div key={exp.id} style={{ background:"#1e293b", borderRadius:13, padding:"13px 14px", border: exp.status==="pending" ? "1px solid rgba(245,158,11,0.3)" : "1px solid #334155", display:"flex", alignItems:"center", gap:10 }}>
                        {exp.receiptFull || exp.receiptPreview ? (
                          <img src={exp.receiptFull || exp.receiptPreview} alt="" onClick={() => setViewReceipt(exp.receiptFull || exp.receiptPreview)}
                            style={{ width:40, height:40, borderRadius:9, objectFit:"cover", border:"2px solid #10b981", flexShrink:0, cursor:"pointer" }} />
                        ) : (
                          <div style={{ width:40, height:40, borderRadius:9, background:`${cat.color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, flexShrink:0 }}>{cat.icon}</div>
                        )}
                        <Avatar name={exp.userName} size={30} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ color:"#f1f5f9", fontWeight:600, fontSize:13 }}>{exp.description}</div>
                          <div style={{ color:"#64748b", fontSize:11, marginTop:1 }}>
                            {exp.userName} · {exp.date} · {cat.label}
                            {!exp.receipt && <span style={{ color:"#ef4444" }}> · ⚠️ no scontrino</span>}
                          </div>
                          {exp.note && <div style={{ color:"#94a3b8", fontSize:11 }}>💬 {exp.note}</div>}
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          <div style={{ color:"#f1f5f9", fontWeight:700, fontSize:14, marginBottom:3 }}>{formatEur(exp.amount)}</div>
                          <StatusBadge status={exp.status} />
                        </div>
                        {exp.status==="pending" && (
                          <button onClick={() => { setSelectedExpense(exp); setNoteInput(""); }}
                            style={{ marginLeft:4, padding:"6px 11px", borderRadius:7, border:"1px solid #3b82f6", background:"rgba(59,130,246,0.1)", color:"#3b82f6", fontWeight:600, fontSize:12, cursor:"pointer", flexShrink:0 }}>
                            Esamina
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>

          {/* Approval modal */}
          {selectedExpense && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(5px)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }} onClick={e => e.target===e.currentTarget && setSelectedExpense(null)}>
              <div style={{ background:"#1e293b", borderRadius:"22px 22px 0 0", padding:"20px 20px 32px", width:"100%", maxWidth:480, border:"1px solid #334155", maxHeight:"80vh", overflowY:"auto" }}>
                <div style={{ width:36, height:4, borderRadius:2, background:"#334155", margin:"0 auto 16px" }} />
                <h2 style={{ color:"#f1f5f9", fontSize:16, fontWeight:800, margin:"0 0 16px" }}>Esamina Spesa</h2>
                <div style={{ background:"#0f172a", borderRadius:10, padding:14, marginBottom:12 }}>
                  <div style={{ color:"#64748b", fontSize:11, marginBottom:3 }}>{selectedExpense.date} · {getCatInfo(selectedExpense.category).label}</div>
                  <div style={{ color:"#f1f5f9", fontWeight:600, marginBottom:3 }}>{selectedExpense.description}</div>
                  <div style={{ color:"#f1f5f9", fontSize:20, fontWeight:800 }}>{formatEur(selectedExpense.amount)}</div>
                  <div style={{ color:"#64748b", fontSize:11, marginTop:4 }}>👤 {selectedExpense.userName} {selectedExpense.receipt ? "· 📎 Scontrino allegato" : "· ⚠️ Nessun scontrino"}</div>
                </div>
                {(selectedExpense.receiptFull || selectedExpense.receiptPreview) && (
                  <div style={{ marginBottom:12, borderRadius:10, overflow:"hidden", border:"1px solid #334155", cursor:"pointer" }} onClick={() => setViewReceipt(selectedExpense.receiptFull || selectedExpense.receiptPreview)}>
                    <img src={selectedExpense.receiptFull || selectedExpense.receiptPreview} alt="Scontrino" style={{ width:"100%", maxHeight:180, objectFit:"cover", display:"block" }} />
                    <div style={{ background:"#0f172a", padding:"6px 12px", color:"#64748b", fontSize:11 }}>📷 Tocca per ingrandire</div>
                  </div>
                )}
                <div style={{ marginBottom:14 }}>
                  <label style={{ color:"#64748b", fontSize:10, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>NOTE (opzionale)</label>
                  <input value={noteInput} onChange={e => setNoteInput(e.target.value)} placeholder="Es: Manca scontrino originale..."
                    style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:"1px solid #334155", background:"#0f172a", color:"#f1f5f9", fontSize:14 }} />
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => setSelectedExpense(null)} style={{ flex:1, padding:12, borderRadius:10, border:"1px solid #334155", background:"none", color:"#94a3b8", fontWeight:600, cursor:"pointer", fontSize:13 }}>Annulla</button>
                  <button onClick={() => handleAction(selectedExpense.id, "rejected")} style={{ flex:1, padding:12, borderRadius:10, border:"none", background:"rgba(239,68,68,0.15)", color:"#ef4444", fontWeight:700, cursor:"pointer", fontSize:13 }}>✕ Rifiuta</button>
                  <button onClick={() => handleAction(selectedExpense.id, "approved")} style={{ flex:1, padding:12, borderRadius:10, border:"none", background:"linear-gradient(135deg,#10b981,#059669)", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:13 }}>✓ Approva</button>
                </div>
              </div>
            </div>
          )}

          {/* Receipt lightbox */}
          {viewReceipt && (
            <div onClick={() => setViewReceipt(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
              <img src={viewReceipt} alt="Scontrino" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:12, objectFit:"contain" }} />
              <button onClick={() => setViewReceipt(null)} style={{ position:"absolute", top:20, right:20, background:"rgba(255,255,255,0.15)", border:"none", color:"#fff", width:36, height:36, borderRadius:"50%", fontSize:18, cursor:"pointer" }}>✕</button>
            </div>
          )}
          <InstallBanner />
        </div>
      );
    }

    // ─── App Root ─────────────────────────────────────────────────────────────

    function App() {
      const [currentUser, setCurrentUser] = useState(() => loadSession());
      const [expenses, setExpenses] = useState(() => loadExpenses());

      const handleLogin = user => {
        sessionStorage.setItem("spesapp_user", JSON.stringify(user));
        setCurrentUser(user);
      };

      const handleLogout = () => {
        sessionStorage.removeItem("spesapp_user");
        setCurrentUser(null);
      };

      const handleAddExpense = useCallback(exp => {
        setExpenses(prev => {
          const next = [exp, ...prev];
          saveExpenses(next);
          return next;
        });
      }, []);

      const handleUpdateStatus = useCallback((id, status, note) => {
        setExpenses(prev => {
          const next = prev.map(e => e.id===id ? { ...e, status, note } : e);
          saveExpenses(next);
          return next;
        });
      }, []);

      if (!currentUser) return <LoginScreen onLogin={handleLogin} />;
      if (currentUser.role==="admin") return <AdminView user={currentUser} expenses={expenses} onUpdateStatus={handleUpdateStatus} onLogout={handleLogout} />;
      return <EmployeeView user={currentUser} expenses={expenses} onAddExpense={handleAddExpense} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
