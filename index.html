    // ─── Persistence — Supabase Cloud ────────────────────────────────────────

    const IMG_PREFIX = "spesapp_img_";

    function saveImageLocal(id, dataUrl) { try { localStorage.setItem(IMG_PREFIX + id, dataUrl); } catch {} }

    // Upload diretto a Supabase Storage dal browser (bypassa il limite 4.5MB di Vercel)
    const SUPABASE_URL = "https://ljtwipkannwwfnvhqbxd.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqdHdpcGthbm53d2ZudmhxYnhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzc2MzUsImV4cCI6MjA5MTgxMzYzNX0.J-Y9D1pdd_ipMe8-X0IKCXY1y-zmI5GYEyBMLVVUi5o";

    async function uploadImageToCloud(expenseId, base64Image) {
      try {
        const mediaType = base64Image.split(";")[0].split(":")[1] || "image/jpeg";
        const base64Data = base64Image.split(",")[1];
        const ext = mediaType.includes("png") ? "png" : "jpg";
        const path = `${expenseId}.${ext}`;

        // Converti base64 in Blob
        const binary = atob(base64Data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: mediaType });

        // Upload diretto a Supabase Storage
        const res = await fetch(`${SUPABASE_URL}/storage/v1/object/receipts/${path}`, {
          method: "POST",
          headers: {
            "apikey": SUPABASE_ANON,
            "Authorization": `Bearer ${SUPABASE_ANON}`,
            "Content-Type": mediaType,
            "x-upsert": "true",
          },
          body: blob,
        });

        if (!res.ok) { console.error("Upload failed:", await res.text()); return null; }
        return `${SUPABASE_URL}/storage/v1/object/public/receipts/${path}`;
      } catch(e) { console.error("Upload error:", e); return null; }
    }

    async function deleteImageFromCloud(expenseId) {
      try {
        for (const ext of ["jpg", "png"]) {
          await fetch(`${SUPABASE_URL}/storage/v1/object/receipts/${expenseId}.${ext}`, {
            method: "DELETE",
            headers: { "apikey": SUPABASE_ANON, "Authorization": `Bearer ${SUPABASE_ANON}` },
          });
        }
      } catch {}
    }

    async function dbFetch(action, payload = {}) {
      const res = await fetch("/api/db", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action, ...payload })
      });
      if (!res.ok) throw new Error(`DB error ${res.status}`);
      return res.json();
    }

    async function loadExpensesFromCloud() {
      const res = await fetch("/api/db");
      if (!res.ok) throw new Error("Load failed");
      const rows = await res.json();
      // Usa URL cloud se disponibile, altrimenti fallback a cache locale
      return rows.map(e => {
        if (e.receiptUrl) return { ...e, receiptFull: e.receiptUrl, receiptPreview: e.receiptUrl };
        const img = loadImageLocal(e.id);
        return img ? { ...e, receiptFull: img, receiptPreview: img } : e;
      });
    }

    // ─── Install Banner ───────────────────────────────────────────────────────

    function InstallBanner() {
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [show, setShow] = useState(false);
      const [installed, setInstalled] = useState(false);

      useEffect(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) return;
        const dismissed = sessionStorage.getItem("pwa_dismissed");
        if (dismissed) return;

        const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShow(true); };
        window.addEventListener('beforeinstallprompt', handler);

        // iOS hint (no native prompt available)
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if (isIOS && !dismissed) setTimeout(() => setShow(true), 2000);

        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const install = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') setInstalled(true);
          setDeferredPrompt(null);
        }
        setShow(false);
      };

      const dismiss = () => { sessionStorage.setItem("pwa_dismissed","1"); setShow(false); };

      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

      if (!show || installed) return null;
      return (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:200, padding:"12px 16px 24px", background:"linear-gradient(to top, #141414, #141414)", borderTop:"1px solid #2a2a2a", boxShadow:"0 -8px 32px rgba(0,0,0,0.4)" }}>

              <div style={{ color:"var(--text)", fontWeight:700, fontSize:14 }}>Installa SpesApp</div>

                : <div style={{ color:"var(--text2)", fontSize:14, marginTop:3 }}>Installala sul telefono per usarla anche offline.</div>
              }
              {deferredPrompt && (
                <button onClick={install} style={{ marginTop:8, padding:"8px 18px", borderRadius:14, border:"none", background:"linear-gradient(135deg,#f5c400,#d4a800)", color:"#000", fontWeight:700, fontSize:15, cursor:"pointer" }}>
                  Installa ora
                </button>
              )}

            <button onClick={dismiss} style={{ background:"none", border:"none", color:"var(--text3)", fontSize:18, cursor:"pointer", padding:4, lineHeight:1 }}>✕</button>
          </div>
        </div>
      );

    function NewExpenseModal({ onClose, onSave, currentUserId, currentUserName, initialData }) {
      const isEdit = !!initialData;
      const [form, setForm] = useState(initialData ? {
        date: initialData.date, amount: String(initialData.amount),
        category: initialData.category, description: initialData.description, receipt: initialData.receipt,
        currency: initialData.currency || "EUR", sharedWith: initialData.sharedWith || ""
      } : { date: new Date().toISOString().split("T")[0], amount:"", category:"travel", description:"", receipt:false, currency:"EUR", sharedWith:"" });
      const [receiptPreview, setReceiptPreview] = useState(initialData?.receiptFull || initialData?.receiptPreview || null);
      const [receiptName, setReceiptName] = useState(initialData?.receipt ? "Scontrino esistente" : "");
      const [saving, setSaving] = useState(false);
      const [ocring, setOcring] = useState(false);
      const [ocrError, setOcrError] = useState("");
      const cameraRef = useRef();
      const galleryRef = useRef();

      const runOCR = async (base64Image) => {
        setOcring(true);
        setOcrError("");
        try {
          const mediaType = base64Image.split(";")[0].split(":")[1] || "image/jpeg";
          const base64Data = base64Image.split(",")[1];
          const resp = await fetch("/api/ocr", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: base64Data, mediaType })
          });
          if (!resp.ok) throw new Error(`Server error ${resp.status}`);
          const parsed = await resp.json();
          if (parsed.error) throw new Error(parsed.error);

          setForm(f => ({
            ...f,
            amount: parsed.importo != null ? String(parsed.importo) : f.amount,
            date: parsed.data || f.date,
            description: parsed.descrizione || f.description || "",
            category: parsed.categoria || f.category,
          }));
        } catch(e) {
          console.error("OCR error:", e);
          setOcrError("Non riesco a leggere lo scontrino. Compila manualmente.");
        } finally {
          setOcring(false);
        }
      };

      const compressImage = (dataUrl, maxPx = 1200, quality = 0.75) => new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = dataUrl;
      });

      const handleFile = async e => {
        const file = e.target.files[0];
        if (!file) return;
        setReceiptName(file.name);
        setForm(f => ({ ...f, receipt:true }));
        const reader = new FileReader();
        reader.onload = async ev => {
          const original = ev.target.result;
          setReceiptPreview(original);
          if (file.type.startsWith("image/")) {
            const compressed = await compressImage(original);
            runOCR(compressed);
          }
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const clearReceipt = () => { setReceiptPreview(null); setReceiptName(""); setOcrError(""); setForm(f => ({ ...f, receipt:false })); };

      const handleSave = () => {
        if (!form.amount || !form.description) return;
        setSaving(true);
        setTimeout(() => {
          if (isEdit) {
            onSave({ ...initialData, ...form, amount:parseFloat(form.amount), receiptPreview, receiptFull:receiptPreview });

            onSave({ id:Date.now(), userId:currentUserId, userName:currentUserName, ...form, amount:parseFloat(form.amount), status:"pending", note:"", receiptPreview, receiptFull:receiptPreview });
          }
          onClose();

            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <div>

                    style={{ width:"100%", padding:"11px 12px", borderRadius:10, border:"1px solid var(--border)", background:"var(--bg)", color:"var(--text)", fontSize:14 }} />
                </div>
                <div>
                  <label style={{ color:"var(--text3)", fontSize:14, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>

                  </label>
                  <div style={{ display:"flex", gap:6 }}>
                    <select value={form.currency} onChange={e => setForm({...form, currency:e.target.value})}
                      style={{ padding:"11px 10px", borderRadius:10, border:"1px solid var(--border)", background:"var(--bg)", color:"var(--text)", fontSize:14, fontWeight:700, cursor:"pointer", flexShrink:0 }}>
                      <option value="EUR">€ EUR</option>

              <div>

                      {cat.icon} {cat.label}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label style={{ color:"var(--text3)", fontSize:14, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>
                  DESCRIZIONE {ocring && <span style={{color:"var(--yellow)"}}>⟳</span>}

      const myExpenses = expenses.filter(e => e.userId === user.id);
      const eurExp   = myExpenses.filter(e => (e.currency||"EUR")==="EUR");
      const total    = eurExp.reduce((s,e) => s+e.amount, 0);
      const approved = eurExp.filter(e => e.status==="approved").reduce((s,e) => s+e.amount, 0);
      const pending  = eurExp.filter(e => e.status==="pending").reduce((s,e) => s+e.amount, 0);
      const usdTotal = myExpenses.filter(e => e.currency==="USD").reduce((s,e) => s+e.amount, 0);

      return (
        <div style={{ minHeight:"100vh", background:"var(--bg)", paddingBottom:90 }}>
          {/* Header */}
          <div style={{ background:"var(--bg)", borderBottom:"1px solid var(--border)", padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10, backdropFilter:"blur(10px)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:36, height:36, background:"linear-gradient(135deg,#f5c400,#d4a800)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <Icon name="briefcase" size={18} color="#000" />
              </div>
              <div>
                <div style={{ color:"var(--text)", fontWeight:800, fontSize:18, lineHeight:1.1 }}>SpesApp</div>
                <div style={{ color:"var(--text3)", fontSize:13 }}>Alberici S.p.A.</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <Avatar name={user.name} size={34} />
              <button onClick={onLogout} style={{ background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text2)", padding:"7px 14px", borderRadius:10, cursor:"pointer", fontSize:14, fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
                <Icon name="logout" size={15} color="var(--text2)" />
                Esci
              </button>
            </div>
          </div>

          {/* Hero card */}
          <div style={{ background:"linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%)", borderBottom:"1px solid var(--border)", padding:"24px 20px 20px" }}>
            <div style={{ maxWidth:600, margin:"0 auto" }}>
              <div style={{ fontSize:14, color:"var(--yellow)", fontWeight:600, marginBottom:4, letterSpacing:0.3 }}>Le mie note spese</div>
              <div style={{ fontSize:30, fontWeight:800, color:"var(--text)", marginBottom:2 }}>{user.name.split(" ")[0]} {user.name.split(" ").slice(1).join(" ")}</div>
              <div style={{ fontSize:32, fontWeight:800, color:"var(--yellow)", marginBottom:20 }}>{formatEur(total)}</div>

              {/* Stats row */}
              <div style={{ display:"flex", gap:10 }}>
                {[
                  { label:"Approvato", value:formatEur(approved), color:"var(--green)", bg:"var(--green-soft)" },
                  { label:"In attesa", value:formatEur(pending), color:"var(--amber)", bg:"var(--amber-soft)" },
                  ...(usdTotal > 0 ? [{ label:"USD", value:formatAmount(usdTotal,"USD"), color:"var(--yellow)", bg:"var(--yellow-soft)" }] : []),
                ].map(s => (
                  <div key={s.label} style={{ flex:1, background:s.bg, borderRadius:14, padding:"12px 14px" }}>
                    <div style={{ color:s.color, fontSize:13, fontWeight:600, marginBottom:4 }}>{s.label}</div>
                    <div style={{ color:"var(--text)", fontSize:17, fontWeight:700 }}>{s.value}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 16px" }}>
            {/* Add button */}
            <button onClick={() => setShowModal(true)}
              style={{ width:"100%", padding:"17px 20px", borderRadius:16, border:"none", background:"#f5c400", color:"#000", fontWeight:700, fontSize:17, cursor:"pointer", marginBottom:20, display:"flex", alignItems:"center", justifyContent:"center", gap:10, boxShadow:"0 4px 24px rgba(245,196,0,0.25)" }}>
              <Icon name="plus" size={20} color="#000" />
              Nuova Nota Spesa
            </button>

            {/* List */}
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {myExpenses.length===0 && (
                <div style={{ textAlign:"center", padding:"48px 20px", color:"var(--text3)" }}>
                  <div style={{ marginBottom:16, opacity:0.4 }}><Icon name="receipt" size={48} color="var(--text3)" /></div>
                  <div style={{ fontSize:17, fontWeight:600, marginBottom:6 }}>Nessuna spesa inserita</div>
                  <div style={{ fontSize:14 }}>Tocca il pulsante qui sopra per iniziare</div>
                </div>
              )}
              {myExpenses.map(exp => {
                const cat = getCatInfo(exp.category);
                const canEdit = exp.status === "pending";
                const accentColor = canEdit ? "var(--yellow)" : exp.status==="approved" ? "var(--green)" : "var(--red)";
                return (
                  <div key={exp.id} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:18, overflow:"hidden" }}>
                    <div style={{ padding:"16px", display:"flex", alignItems:"flex-start", gap:14 }}>
                      {exp.receiptFull || exp.receiptPreview ? (
                        <img src={exp.receiptFull || exp.receiptPreview} alt="scontrino" onClick={() => setViewReceipt(exp.receiptFull || exp.receiptPreview)}
                          style={{ width:52, height:52, borderRadius:12, objectFit:"cover", border:"2px solid var(--green)", flexShrink:0, cursor:"pointer" }} />
                      ) : (
                        <div style={{ width:52, height:52, borderRadius:12, background:`${cat.color}18`, border:`1px solid ${cat.color}30`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>{cat.icon}</div>
                      )}
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ color:"var(--text)", fontWeight:700, fontSize:16, marginBottom:4, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{exp.description}</div>
                        <div style={{ color:"var(--text3)", fontSize:14, marginBottom:exp.sharedWith||exp.note ? 6 : 0 }}>{cat.label} · {exp.date}</div>
                        {exp.sharedWith && <div style={{ color:"var(--text2)", fontSize:14, marginBottom:2, display:"flex", alignItems:"center", gap:5 }}><Icon name="users" size={13} color="var(--text2)" />{exp.sharedWith}</div>}
                        {exp.note && <div style={{ color:"var(--amber)", fontSize:14, display:"flex", alignItems:"center", gap:5 }}><Icon name="info" size={13} color="var(--amber)" />{exp.note}</div>}
                      </div>
                      <div style={{ textAlign:"right", flexShrink:0 }}>
                        <div style={{ color:"var(--yellow)", fontWeight:800, fontSize:18, marginBottom:6 }}>{formatAmount(exp.amount, exp.currency || "EUR")}</div>
                        <StatusBadge status={exp.status} />
                      </div>
                    </div>
                    {canEdit ? (
                      <div style={{ display:"flex", borderTop:"1px solid var(--border)" }}>
                        <button onClick={() => setEditingExpense(exp)}
                          style={{ flex:1, padding:"12px", background:"none", border:"none", color:"var(--yellow)", fontWeight:600, fontSize:15, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:7 }}>
                          <Icon name="edit" size={16} color="var(--yellow)" /> Modifica
                        </button>
                        <div style={{ width:1, background:"var(--border)" }} />
                        <button onClick={() => setDeletingExpense(exp)}
                          style={{ flex:1, padding:"12px", background:"none", border:"none", color:"var(--red)", fontWeight:600, fontSize:15, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:7 }}>
                          <Icon name="trash" size={16} color="var(--red)" /> Elimina
                        </button>
                      </div>
                    ) : (
                      <div style={{ borderTop:"1px solid #0a0a0a" }}>
                        <button onClick={() => setViewingExpense(exp)}
                          style={{ width:"100%", padding:"9px", background:"none", border:"none", color: exp.status==="approved" ? "var(--green)" : "var(--red)", fontWeight:600, fontSize:15, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:7 }}>
                          <Icon name="eye" size={16} color={exp.status==="approved" ? "var(--green)" : "var(--red)"} /> Visualizza dettagli
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {showModal && <NewExpenseModal onClose={() => setShowModal(false)} onSave={onAddExpense} currentUserId={user.id} currentUserName={user.name} />}
          {editingExpense && <NewExpenseModal onClose={() => setEditingExpense(null)} onSave={exp => { onEditExpense(exp); setEditingExpense(null); }} currentUserId={user.id} currentUserName={user.name} initialData={editingExpense} />}

          {/* Delete confirm */}
          {deletingExpense && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:150, padding:24 }}>
              <div style={{ background:"var(--surface)", borderRadius:24, padding:"28px 24px", width:"100%", maxWidth:360, border:"1px solid var(--border)", boxShadow:"0 24px 60px rgba(0,0,0,0.5)" }}>
                <div style={{ width:56, height:56, background:"var(--red-soft)", borderRadius:16, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px" }}>
                  <Icon name="trash" size={26} color="var(--red)" />
                </div>
                <h3 style={{ color:"var(--text)", fontSize:20, fontWeight:700, textAlign:"center", margin:"0 0 8px" }}>Elimina spesa?</h3>
                <p style={{ color:"var(--text2)", fontSize:15, textAlign:"center", margin:"0 0 24px", lineHeight:1.5 }}>"{deletingExpense.description}"<br/>{formatAmount(deletingExpense.amount, deletingExpense.currency || "EUR")}</p>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => setDeletingExpense(null)} style={{ flex:1, padding:"14px", borderRadius:14, border:"1px solid var(--border2)", background:"none", color:"var(--text2)", fontWeight:600, fontSize:16, cursor:"pointer" }}>Annulla</button>
                  <button onClick={() => { onDeleteExpense(deletingExpense.id); setDeletingExpense(null); }} style={{ flex:1, padding:"14px", borderRadius:14, border:"none", background:"var(--red)", color:"var(--text)", fontWeight:700, fontSize:16, cursor:"pointer" }}>Elimina</button>
                </div>
              </div>
            </div>
          )}

          {/* Receipt lightbox */}
          {viewReceipt && (
            <div onClick={() => setViewReceipt(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
              <img src={viewReceipt} alt="Scontrino" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:12, objectFit:"contain" }} />
              <button onClick={() => setViewReceipt(null)} style={{ position:"absolute", top:20, right:20, background:"rgba(255,255,255,0.15)", border:"none", color:"var(--text)", width:36, height:36, borderRadius:"50%", fontSize:18, cursor:"pointer" }}>✕</button>
            </div>
          )}

          {viewingExpense && <ReadOnlyExpenseModal exp={viewingExpense} onClose={() => setViewingExpense(null)} onViewReceipt={setViewReceipt} />}

          <InstallBanner />
        </div>
      );
    }

    // ─── Admin View ───────────────────────────────────────────────────────────

    function AdminView({ user, expenses, onUpdateStatus, onLogout }) {
      const [activeTab, setActiveTab] = useState("dashboard");
      const [filterStatus, setFilterStatus] = useState("all");
      const [selectedExpense, setSelectedExpense] = useState(null);
      const [noteInput, setNoteInput] = useState("");
      const [viewReceipt, setViewReceipt] = useState(null);

      const pending  = expenses.filter(e => e.status==="pending");
      const eurAll   = expenses.filter(e => (e.currency||"EUR")==="EUR");
      const totalAll = eurAll.reduce((s,e) => s+e.amount, 0);
      const totalApproved = eurAll.filter(e => e.status==="approved").reduce((s,e) => s+e.amount, 0);
      const usdAll   = expenses.filter(e => e.currency==="USD").reduce((s,e) => s+e.amount, 0);

      const byCategory = CATEGORIES.map(cat => ({
        ...cat, total: expenses.filter(e => e.category===cat.id).reduce((s,e) => s+e.amount, 0)
      })).filter(c => c.total>0).sort((a,b) => b.total-a.total);

      const byEmployee = USERS.filter(u => u.role==="employee").map(u => ({
        ...u,
        total: expenses.filter(e => e.userId===u.id && (e.currency||"EUR")==="EUR").reduce((s,e) => s+e.amount, 0),
        totalUsd: expenses.filter(e => e.userId===u.id && e.currency==="USD").reduce((s,e) => s+e.amount, 0),
        count: expenses.filter(e => e.userId===u.id).length
      })).sort((a,b) => b.total-a.total);

      const filtered = filterStatus==="all" ? expenses : expenses.filter(e => e.status===filterStatus);

      const handleAction = (id, status) => {
        onUpdateStatus(id, status, noteInput);
        setSelectedExpense(null);
        setNoteInput("");
      };

      const exportExcel = () => {
        const XLSX = window.XLSX;
        if (!XLSX) { alert("Libreria Excel non caricata, riprova."); return; }

        const today = new Date().toISOString().split("T")[0];
        const wb = XLSX.utils.book_new();

        // ── Foglio 1: Tutte le spese ──────────────────────────────────────
        const allRows = expenses.map(e => ({
          "ID":           e.id,
          "Dipendente":   e.userName,
          "Data":         e.date,
          "Importo":      parseFloat(e.amount),
          "Valuta":       e.currency || "EUR",
          "Categoria":    getCatInfo(e.category).label,
          "Descrizione":  e.description,
          "Con chi":      e.sharedWith || "",
          "Stato":        STATUS_CONFIG[e.status].label,
          "Scontrino":    e.receipt ? "Sì" : "No",
          "Note admin":   e.note || "",
        }));
        const ws1 = XLSX.utils.json_to_sheet(allRows);

        // Larghezze colonne
        ws1["!cols"] = [
          {wch:8}, {wch:20}, {wch:12}, {wch:10}, {wch:8},
          {wch:16}, {wch:40}, {wch:24}, {wch:12}, {wch:10}, {wch:24}
        ];
        XLSX.utils.book_append_sheet(wb, ws1, "Tutte le spese");

        // ── Foglio 2: Riepilogo per dipendente ────────────────────────────
        const byEmp = {};
        expenses.forEach(e => {
          if (!byEmp[e.userName]) byEmp[e.userName] = { tot: 0, approvato: 0, inAttesa: 0, rifiutato: 0, n: 0 };
          byEmp[e.userName].n++;
          byEmp[e.userName].tot += e.amount;
          if (e.status === "approved") byEmp[e.userName].approvato += e.amount;
          if (e.status === "pending")  byEmp[e.userName].inAttesa += e.amount;
          if (e.status === "rejected") byEmp[e.userName].rifiutato += e.amount;
        });
        const empRows = Object.entries(byEmp).map(([name, v]) => ({
          "Dipendente":       name,
          "N. spese":         v.n,
          "Totale (€)":       parseFloat(v.tot.toFixed(2)),
          "Approvato (€)":    parseFloat(v.approvato.toFixed(2)),
          "In attesa (€)":    parseFloat(v.inAttesa.toFixed(2)),
          "Rifiutato (€)":    parseFloat(v.rifiutato.toFixed(2)),
        }));
        const ws2 = XLSX.utils.json_to_sheet(empRows);
        ws2["!cols"] = [{wch:22},{wch:10},{wch:14},{wch:14},{wch:14},{wch:14}];
        XLSX.utils.book_append_sheet(wb, ws2, "Per dipendente");

        // ── Foglio 3: Riepilogo per categoria ─────────────────────────────
        const byCat = {};
        expenses.forEach(e => {
          const lbl = getCatInfo(e.category).label;
          if (!byCat[lbl]) byCat[lbl] = { tot: 0, n: 0 };
          byCat[lbl].n++;
          byCat[lbl].tot += e.amount;
        });
        const catRows = Object.entries(byCat)
          .sort((a,b) => b[1].tot - a[1].tot)
          .map(([cat, v]) => ({
            "Categoria":   cat,
            "N. spese":    v.n,
            "Totale (€)":  parseFloat(v.tot.toFixed(2)),
          }));
        const ws3 = XLSX.utils.json_to_sheet(catRows);
        ws3["!cols"] = [{wch:20},{wch:10},{wch:14}];
        XLSX.utils.book_append_sheet(wb, ws3, "Per categoria");

        // ── Download ──────────────────────────────────────────────────────
        XLSX.writeFile(wb, `SpesApp_Report_${today}.xlsx`);
      };

      const exportCSV = exportExcel; // backward compat

      const TABS = [
        { id:"dashboard", label:"Dashboard", icon:"📊" },
        { id:"expenses",  label:`Spese${pending.length ? ` (${pending.length})` : ""}`, icon:"📋" },
      ];

      return (
        <div style={{ minHeight:"100vh", background:"var(--bg)", paddingBottom:60 }}>
          {/* Header */}
          <div style={{ background:"var(--bg)", borderBottom:"1px solid var(--border)", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:36, height:36, background:"linear-gradient(135deg,#f5c400,#d4a800)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Icon name="briefcase" size={18} color="#000" />
                </div>
                <div>
                  <div style={{ color:"var(--text)", fontWeight:800, fontSize:18, lineHeight:1.1 }}>SpesApp</div>
                  <div style={{ color:"var(--yellow)", fontSize:13, fontWeight:600 }}>Admin Console</div>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <Avatar name={user.name} size={34} />
                <button onClick={onLogout} style={{ background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text2)", padding:"7px 14px", borderRadius:10, cursor:"pointer", fontSize:14, fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
                  <Icon name="logout" size={15} color="var(--text2)" />Esci
                </button>
              </div>
            </div>
            <div style={{ display:"flex", gap:0, borderTop:"1px solid var(--border)", padding:"0 8px" }}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)}
                  style={{ padding:"12px 20px", border:"none", background:"none", color: activeTab===t.id ? "var(--yellow)" : "var(--text3)", fontWeight:700, fontSize:15, cursor:"pointer", borderBottom: activeTab===t.id ? "2px solid var(--yellow)" : "2px solid transparent", transition:"all 0.2s", display:"flex", alignItems:"center", gap:7 }}>
                  <Icon name={t.id==="dashboard" ? "chart" : "list"} size={17} color={activeTab===t.id ? "var(--yellow)" : "var(--text3)"} /> {t.label}
                </button>
              ))}
            </div>
          </div>

          <div style={{ maxWidth:800, margin:"0 auto", padding:"16px 14px" }}>
            {activeTab==="dashboard" && (
              <>
                {/* KPI strip */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12, marginBottom:20 }}>
                  {[
                    { label:"Totale €", value:formatEur(totalAll), color:"var(--yellow)", bg:"var(--yellow-soft)", icon:"download" },
                    { label:"Approvato €", value:formatEur(totalApproved), color:"var(--green)", bg:"var(--green-soft)", icon:"check" },
                    ...(usdAll > 0 ? [{ label:"Totale $", value:formatAmount(usdAll,"USD"), color:"var(--yellow)", bg:"var(--yellow-soft)", icon:"star" }] : []),
                    { label:"In attesa", value:`${pending.length} richieste`, color:"var(--amber)", bg:"var(--amber-soft)", icon:"clock" },
                    { label:"Dipendenti attivi", value:byEmployee.length, color:"var(--text2)", bg:"var(--surface2)", icon:"users" },
                  ].map(k => (
                    <div key={k.label} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:18, padding:"16px 18px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                        <div style={{ color:"var(--text3)", fontSize:14, fontWeight:500 }}>{k.label}</div>
                        <div style={{ background:k.bg, borderRadius:10, padding:7, display:"flex" }}>
                          <Icon name={k.icon} size={16} color={k.color} />
                        </div>
                      </div>
                      <div style={{ color:k.color, fontSize:24, fontWeight:800 }}>{k.value}</div>
                    </div>
                  ))}
                </div>

                {/* Charts */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
                  <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:18, padding:18 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:"var(--text)", marginBottom:16, display:"flex", alignItems:"center", gap:8 }}>
                      <Icon name="chart" size={16} color="var(--yellow)" /> Categorie
                    </div>
                    {byCategory.map(cat => {
                      const pct = totalAll>0 ? (cat.total/totalAll)*100 : 0;
                      return (
                        <div key={cat.id} style={{ marginBottom:12 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                            <span style={{ color:"var(--text2)", fontSize:14 }}>{cat.icon} {cat.label}</span>
                            <span style={{ color:"var(--text)", fontWeight:700, fontSize:14 }}>{formatEur(cat.total)}</span>
                          </div>
                          <div style={{ height:5, borderRadius:4, background:"var(--surface2)" }}>
                            <div style={{ height:"100%", width:`${pct}%`, background:"#f5c400", borderRadius:4, transition:"width 0.8s" }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:18, padding:18 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:"var(--text)", marginBottom:16, display:"flex", alignItems:"center", gap:8 }}>
                      <Icon name="users" size={16} color="var(--yellow)" /> Dipendenti
                    </div>
                    {byEmployee.map(emp => (
                      <div key={emp.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                        <Avatar name={emp.name} size={32} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ color:"var(--text)", fontSize:14, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{emp.name}</div>
                          <div style={{ color:"var(--text3)", fontSize:13 }}>{emp.count} spese</div>
                        </div>
                        <div style={{ color:"var(--yellow)", fontWeight:800, fontSize:15 }}>
                          {formatEur(emp.total)}{emp.totalUsd > 0 && <span style={{color:"var(--text3)", fontSize:13, marginLeft:3}}>+{formatAmount(emp.totalUsd,"USD")}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {pending.length>0 && (
                  <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderLeft:"3px solid #f59e0b", borderRadius:"0 6px 6px 0", padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div style={{ color:"var(--amber)", fontWeight:700, fontSize:15, letterSpacing:0.3 }}>⏳ {pending.length} spese in attesa di approvazione</div>
                    <button onClick={() => setActiveTab("expenses")} style={{ background:"#f5c400", border:"none", color:"#000", fontWeight:800, padding:"7px 14px", borderRadius:10, cursor:"pointer", fontSize:15, letterSpacing:0.5, textTransform:"uppercase" }}>Gestisci →</button>
                  </div>
                )}
              </>
            )}

            {activeTab==="expenses" && (
              <>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {["all","pending","approved","rejected"].map(s => (
                      <button key={s} onClick={() => setFilterStatus(s)}
                        style={{ padding:"6px 12px", borderRadius:20, border:"1px solid", borderColor: filterStatus===s ? "var(--yellow)" : "#2a2a2a", background: filterStatus===s ? "rgba(245,196,0,0.15)" : "none", color: filterStatus===s ? "var(--yellow)" : "#666666", fontSize:14, fontWeight:600, cursor:"pointer" }}>
                        {s==="all" ? "Tutte" : STATUS_CONFIG[s]?.label}
                        {s==="pending" && pending.length>0 && <span style={{ marginLeft:3, background:"var(--amber)", color:"#000", fontSize:11, fontWeight:800, padding:"1px 4px", borderRadius:14 }}>{pending.length}</span>}
                      </button>
                    ))}
                  </div>
                  <button onClick={exportExcel} style={{ padding:"7px 12px", borderRadius:14, border:"1px solid #f5c400", background:"rgba(245,196,0,0.08)", color:"var(--yellow)", fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>📊 Excel</button>
                </div>

                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {filtered.map(exp => {
                    const cat = getCatInfo(exp.category);
                    return (
                      <div key={exp.id} style={{ background:"var(--surface)", borderRadius:13, padding:"13px 14px", border: exp.status==="pending" ? "1px solid rgba(245,158,11,0.3)" : "1px solid #2a2a2a", display:"flex", alignItems:"center", gap:10 }}>
                        {exp.receiptFull || exp.receiptPreview ? (
                          <img src={exp.receiptFull || exp.receiptPreview} alt="" onClick={() => setViewReceipt(exp.receiptFull || exp.receiptPreview)}
                            style={{ width:40, height:40, borderRadius:14, objectFit:"cover", border:"2px solid #10b981", flexShrink:0, cursor:"pointer" }} />
                        ) : (
                          <div style={{ width:40, height:40, borderRadius:14, background:`${cat.color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17, flexShrink:0 }}>{cat.icon}</div>
                        )}
                        <Avatar name={exp.userName} size={30} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ color:"var(--text)", fontWeight:600, fontSize:15 }}>{exp.description}</div>
                          <div style={{ color:"var(--text3)", fontSize:15, marginTop:1 }}>
                            {exp.userName} · {exp.date} · {cat.label}
                            {!exp.receipt && <span style={{ color:"var(--red)" }}> · ⚠️ no scontrino</span>}
                          </div>
                          {exp.sharedWith && <div style={{ color:"var(--text2)", fontSize:15 }}>👥 {exp.sharedWith}</div>}
                          {exp.note && <div style={{ color:"var(--text2)", fontSize:15 }}>💬 {exp.note}</div>}
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0 }}>
                          <div style={{ color:"var(--text)", fontWeight:700, fontSize:14, marginBottom:3 }}>{formatAmount(exp.amount, exp.currency || "EUR")}</div>
                          <StatusBadge status={exp.status} />
                        </div>
                        {exp.status==="pending" && (
                          <button onClick={() => { setSelectedExpense(exp); setNoteInput(""); }}
                            style={{ marginLeft:4, padding:"6px 11px", borderRadius:12, border:"1px solid #f5c400", background:"rgba(245,196,0,0.1)", color:"var(--yellow)", fontWeight:600, fontSize:14, cursor:"pointer", flexShrink:0 }}>
                            Esamina
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>

          {/* Approval modal */}
          {selectedExpense && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(5px)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }} onClick={e => e.target===e.currentTarget && setSelectedExpense(null)}>
              <div style={{ background:"var(--surface)", borderRadius:"22px 22px 0 0", padding:"20px 20px 32px", width:"100%", maxWidth:480, border:"1px solid var(--border)", maxHeight:"80vh", overflowY:"auto" }}>
                <div style={{ width:36, height:4, borderRadius:2, background:"#2a2a2a", margin:"0 auto 16px" }} />
                <h2 style={{ color:"var(--text)", fontSize:16, fontWeight:800, margin:"0 0 16px" }}>Esamina Spesa</h2>
                <div style={{ background:"var(--bg)", borderRadius:10, padding:14, marginBottom:12 }}>
                  <div style={{ color:"var(--text3)", fontSize:15, marginBottom:3 }}>{selectedExpense.date} · {getCatInfo(selectedExpense.category).label}</div>
                  <div style={{ color:"var(--text)", fontWeight:600, marginBottom:3 }}>{selectedExpense.description}</div>
                  <div style={{ color:"var(--text)", fontSize:20, fontWeight:800 }}>{formatAmount(selectedExpense.amount, selectedExpense.currency || "EUR")}</div>
                  <div style={{ color:"var(--text3)", fontSize:15, marginTop:4 }}>👤 {selectedExpense.userName} {selectedExpense.receipt ? "· 📎 Scontrino allegato" : "· ⚠️ Nessun scontrino"}</div>
              {selectedExpense.sharedWith && <div style={{ color:"var(--text2)", fontSize:15, marginTop:3 }}>👥 Con: {selectedExpense.sharedWith}</div>}
                </div>
                {(selectedExpense.receiptFull || selectedExpense.receiptPreview) && (
                  <div style={{ marginBottom:12, borderRadius:10, overflow:"hidden", border:"1px solid var(--border)", cursor:"pointer" }} onClick={() => setViewReceipt(selectedExpense.receiptFull || selectedExpense.receiptPreview)}>
                    <img src={selectedExpense.receiptFull || selectedExpense.receiptPreview} alt="Scontrino" style={{ width:"100%", maxHeight:180, objectFit:"cover", display:"block" }} />
                    <div style={{ background:"var(--bg)", padding:"6px 12px", color:"var(--text3)", fontSize:15 }}>📷 Tocca per ingrandire</div>
                  </div>
                )}
                <div style={{ marginBottom:14 }}>
                  <label style={{ color:"var(--text3)", fontSize:14, fontWeight:700, display:"block", marginBottom:5, letterSpacing:0.8 }}>NOTE (opzionale)</label>
                  <input value={noteInput} onChange={e => setNoteInput(e.target.value)} placeholder="Es: Manca scontrino originale..."
                    style={{ width:"100%", padding:"10px 12px", borderRadius:14, border:"1px solid var(--border)", background:"var(--bg)", color:"var(--text)", fontSize:14 }} />
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => setSelectedExpense(null)} style={{ flex:1, padding:12, borderRadius:10, border:"1px solid var(--border)", background:"none", color:"var(--text2)", fontWeight:600, cursor:"pointer", fontSize:15 }}>Annulla</button>
                  <button onClick={() => handleAction(selectedExpense.id, "rejected")} style={{ flex:1, padding:12, borderRadius:10, border:"none", background:"rgba(239,68,68,0.15)", color:"var(--red)", fontWeight:700, cursor:"pointer", fontSize:15 }}>✕ Rifiuta</button>
                  <button onClick={() => handleAction(selectedExpense.id, "approved")} style={{ flex:1, padding:12, borderRadius:10, border:"none", background:"linear-gradient(135deg,#10b981,#059669)", color:"var(--text)", fontWeight:700, cursor:"pointer", fontSize:15 }}>✓ Approva</button>
                </div>
              </div>
            </div>
          )}

          {/* Receipt lightbox */}
          {viewReceipt && (
            <div onClick={() => setViewReceipt(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
              <img src={viewReceipt} alt="Scontrino" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:12, objectFit:"contain" }} />
              <button onClick={() => setViewReceipt(null)} style={{ position:"absolute", top:20, right:20, background:"rgba(255,255,255,0.15)", border:"none", color:"var(--text)", width:36, height:36, borderRadius:"50%", fontSize:18, cursor:"pointer" }}>✕</button>
            </div>
          )}

          {viewingExpense && <ReadOnlyExpenseModal exp={viewingExpense} onClose={() => setViewingExpense(null)} onViewReceipt={setViewReceipt} />}

          <InstallBanner />
        </div>
      );
    }

    // ─── App Root — Supabase Cloud ────────────────────────────────────────────

    function App() {
      const [currentUser, setCurrentUser] = useState(() => loadSession());
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [dbError, setDbError] = useState("");

      // Load expenses from cloud on mount and after login
      useEffect(() => {
        if (!currentUser) { setLoading(false); return; }
        setLoading(true);
        setDbError("");
        loadExpensesFromCloud()
          .then(rows => { setExpenses(rows); setLoading(false); })
          .catch(e => { setDbError("Errore connessione database. Riprova."); setLoading(false); });
      }, [currentUser]);

      const handleLogin = user => {
        sessionStorage.setItem("spesapp_user", JSON.stringify(user));
        setCurrentUser(user);
      };

      const handleLogout = () => {
        sessionStorage.removeItem("spesapp_user");
        setCurrentUser(null);
        setExpenses([]);
      };

      const handleAddExpense = useCallback(async exp => {
        try {
          // Rimuovi immagini dall'oggetto prima di inviare al DB (troppo grandi)
          const imageData = exp.receiptFull || exp.receiptPreview;
          const expenseForDb = { ...exp, receiptPreview: null, receiptFull: null };

          const saved = await dbFetch("add", { expense: expenseForDb });

          // Mostra subito con anteprima locale
          if (imageData) saveImageLocal(saved.id, imageData);
          setExpenses(prev => [{ ...saved, receiptFull: imageData, receiptPreview: imageData }, ...prev]);

          // Upload foto su Supabase Storage in background
          if (imageData) {
            const cloudUrl = await uploadImageToCloud(saved.id, imageData);
            if (cloudUrl) {
              await dbFetch("updateReceiptUrl", { id: saved.id, url: cloudUrl });
              setExpenses(prev => prev.map(e => e.id === saved.id
                ? { ...e, receiptFull: cloudUrl, receiptPreview: cloudUrl }
                : e
              ));
            }
          }
        } catch(e) { alert("Errore salvataggio: " + e.message); }
      }, []);

      const handleUpdateStatus = useCallback(async (id, status, note) => {
        try {
          const updated = await dbFetch("updateStatus", { id, status, note });
          // Recupera immagine: prima da URL cloud, poi da cache locale
          const cloudUrl = updated.receiptUrl;
          const localImg = loadImageLocal(id);
          const imgSrc = cloudUrl || localImg;
          const withImg = imgSrc ? { ...updated, receiptFull: imgSrc, receiptPreview: imgSrc } : updated;
          setExpenses(prev => prev.map(e => e.id===id ? withImg : e));
        } catch(e) { alert("Errore aggiornamento: " + e.message); }
      }, []);

      const handleEditExpense = useCallback(async exp => {
        try {
          const imageData = exp.receiptFull || exp.receiptPreview;
          const expenseForDb = { ...exp, receiptPreview: null, receiptFull: null };

          const updated = await dbFetch("edit", { expense: expenseForDb });

          // Aggiorna cache locale
          if (imageData) saveImageLocal(exp.id, imageData);
          const withImg = imageData ? { ...updated, receiptFull: imageData, receiptPreview: imageData } : updated;
          setExpenses(prev => prev.map(e => e.id===exp.id ? withImg : e));

          // Upload nuova foto se cambiata e non è già un URL cloud
          if (imageData && !imageData.startsWith("http")) {
            const cloudUrl = await uploadImageToCloud(exp.id, imageData);
            if (cloudUrl) {
              await dbFetch("updateReceiptUrl", { id: exp.id, url: cloudUrl });
              setExpenses(prev => prev.map(e => e.id===exp.id
                ? { ...e, receiptFull: cloudUrl, receiptPreview: cloudUrl }
                : e
              ));
            }
          }
        } catch(e) { alert("Errore modifica: " + e.message); }
      }, []);

      const handleDeleteExpense = useCallback(async id => {
        try {
          await dbFetch("delete", { id });
          deleteImageLocal(id);
          deleteImageFromCloud(id); // async, non bloccante
          setExpenses(prev => prev.filter(e => e.id !== id));
        } catch(e) { alert("Errore eliminazione: " + e.message); }
      }, []);

      if (!currentUser) return <LoginScreen onLogin={handleLogin} />;

      if (loading) return (
        <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
          <div style={{ width:24, height:24, border:"3px solid #f5c400", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
          <div style={{ color:"var(--text3)", fontSize:14, letterSpacing:2, textTransform:"uppercase" }}>Caricamento dati...</div>
        </div>
      );

      if (dbError) return (
        <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, padding:24 }}>
          <div style={{ fontSize:32 }}>⚠️</div>
          <div style={{ color:"var(--red)", fontWeight:700, textAlign:"center" }}>{dbError}</div>
          <button onClick={() => { setDbError(""); setLoading(true); loadExpensesFromCloud().then(r => { setExpenses(r); setLoading(false); }).catch(() => setDbError("Errore connessione database. Riprova.")); }}
            style={{ padding:"10px 24px", background:"#f5c400", border:"none", borderRadius:12, fontWeight:800, cursor:"pointer", fontSize:15 }}>
            Riprova
          </button>
        </div>
      );

      if (currentUser.role==="admin") return <AdminView user={currentUser} expenses={expenses} onUpdateStatus={handleUpdateStatus} onLogout={handleLogout} />;
      return <EmployeeView user={currentUser} expenses={expenses} onAddExpense={handleAddExpense} onEditExpense={handleEditExpense} onDeleteExpense={handleDeleteExpense} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
